<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange Fruit — AI BikeFit Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --or: #F47B00;
  --ord: #C96200;
  --orl: #FFF8F0;
  --orb: #F5C060;
  --dk: #0F0F0F;
  --dk2: #1A1A1A;
  --dk3: #252525;
  --bg: #F7F6F4;
  --sur: #FFFFFF;
  --sur2: #F9F9F8;
  --sur3: #F2F1EF;
  --bd: #E8E8E6;
  --bd2: #D8D8D5;
  --bd3: #C8C8C4;
  --tx: #0F0F0F;
  --tx2: #3A3A3A;
  --tx3: #7A7A78;
  --tx4: #ADADAA;
  --ok: #0B8A5C;
  --ok-bg: #E8F6EF;
  --ok-bd: #9ADFC0;
  --wn: #B86A00;
  --wn-bg: #FEF3E2;
  --wn-bd: #F5C87A;
  --er: #C0231A;
  --er-bg: #FDECEB;
  --er-bd: #F5ACA8;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'DM Mono', 'Courier New', monospace;
  --r: 16px;
  --rs: 10px;
  --rl: 20px;
  --sh: 0 1px 3px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.06);
  --sh2: 0 8px 32px rgba(0,0,0,.12);
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--tx);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.5;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--bd2); }
input[type=range] { accent-color: var(--or); width: 100%; cursor: pointer; }
input[type=file] { display: none; }

/* ═══════════════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════════════ */
@keyframes spin    { to { transform: rotate(360deg); } }
@keyframes fadeUp  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
@keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
@keyframes pulse   { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.75)} }
@keyframes progBar { 0%{background-position:0 0} 100%{background-position:48px 0} }
@keyframes glow    { 0%,100%{box-shadow:0 4px 18px rgba(244,123,0,.45)} 50%{box-shadow:0 4px 28px rgba(244,123,0,.7)} }

.fade-up { animation: fadeUp .35s cubic-bezier(.22,1,.36,1) both; }
.fade-in { animation: fadeIn .25s ease both; }

/* ═══════════════════════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════════════════════ */
.navbar {
  background: var(--dk);
  height: 66px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}
.nav-logo-wrap {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-wordmark {}
.nav-name {
  font-size: 18px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -.03em;
  line-height: 1.1;
}
.nav-name span { color: var(--or); }
.nav-tagline {
  font-size: 9px;
  color: rgba(244,123,0,.7);
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 500;
  margin-top: 2px;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(244,123,0,.12);
  color: var(--or);
  border: 1px solid rgba(244,123,0,.35);
  letter-spacing: .07em;
  font-weight: 500;
}
.nav-version {
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(255,255,255,.25);
  letter-spacing: .06em;
}

/* ═══════════════════════════════════════════════════════════
   PAGE LAYOUT
═══════════════════════════════════════════════════════════ */
.page {
  max-width: 1020px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}

/* ═══════════════════════════════════════════════════════════
   STEP INDICATOR
═══════════════════════════════════════════════════════════ */
.step-bar {
  display: flex;
  align-items: center;
  background: var(--sur);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  padding: 16px 24px;
  margin-bottom: 24px;
  box-shadow: var(--sh);
  overflow-x: auto;
  gap: 0;
}
.step-item {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.step-circle {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  transition: all .35s cubic-bezier(.22,1,.36,1);
}
.step-circle.done   { background: var(--or); color: #fff; }
.step-circle.active { background: var(--dk); color: #fff; }
.step-circle.idle   { background: var(--bd); color: var(--tx4); }
.step-label {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  transition: color .3s;
}
.step-label.active { color: var(--tx); }
.step-label.idle   { color: var(--tx4); }
.step-connector {
  flex: 1;
  min-width: 32px;
  height: 2px;
  background: var(--bd);
  margin: 0 10px;
  border-radius: 1px;
  transition: background .5s;
}
.step-connector.done { background: var(--or); }

/* ═══════════════════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════════════════ */
.card {
  background: var(--sur);
  border: 1px solid var(--bd);
  border-radius: var(--rl);
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: var(--sh);
}
.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  border-bottom: 1px solid var(--bd);
  flex-wrap: wrap;
  gap: 10px;
}
.card-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.card-body  { padding: 22px; }

/* ═══════════════════════════════════════════════════════════
   INSTRUCTION BOX
═══════════════════════════════════════════════════════════ */
.instr-box {
  background: linear-gradient(135deg, #FFF8F0, #FFECD8);
  border: 1px solid var(--orb);
  border-radius: var(--rs);
  padding: 16px 18px;
  margin-bottom: 20px;
}
.instr-title { font-size: 12px; font-weight: 700; color: #8A4200; margin-bottom: 10px; }
.instr-steps { display: flex; flex-direction: column; gap: 7px; }
.instr-step  { display: flex; align-items: flex-start; gap: 10px; font-size: 12px; color: #6A3200; line-height: 1.55; }
.instr-num   {
  width: 21px; height: 21px; border-radius: 50%;
  background: var(--or); color: #fff;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}

/* ═══════════════════════════════════════════════════════════
   UPLOAD SLOTS
═══════════════════════════════════════════════════════════ */
.upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }

.upload-slot {
  border: 2px dashed var(--bd2);
  border-radius: var(--r);
  overflow: hidden;
  cursor: pointer;
  transition: all .22s cubic-bezier(.22,1,.36,1);
  background: var(--sur2);
  min-height: 220px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.upload-slot:hover, .upload-slot.drag { border-color: var(--or); background: var(--orl); }
.upload-slot.filled { border-style: solid; border-color: var(--or); background: var(--sur); cursor: default; }

.slot-badge-bar {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid transparent;
}
.slot-badge-bar.bdc { background: #FFF0DC; border-color: #F5D080; }
.slot-badge-bar.tdc { background: #E8F4FF; border-color: #B5D4F4; }

.slot-badge {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: .1em;
}
.slot-badge.bdc { background: var(--or); color: #fff; }
.slot-badge.tdc { background: #1A6AAD; color: #fff; }

.slot-name { font-size: 12px; font-weight: 600; color: #3A3A3A; }

.slot-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  gap: 8px;
  text-align: center;
}
.slot-icon    { font-size: 32px; opacity: .35; }
.slot-desc    { font-size: 11px; color: var(--tx3); font-family: var(--mono); line-height: 1.6; }
.slot-hint    { font-size: 11px; color: var(--or); font-weight: 600; }
.slot-preview { width: 100%; height: 220px; object-fit: cover; display: block; }

.slot-remove {
  position: absolute;
  top: 44px;
  right: 10px;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: rgba(0,0,0,.65);
  color: #fff;
  border: none;
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  z-index: 10;
  font-family: var(--font);
}
.slot-remove:hover { background: rgba(192,35,26,.85); transform: scale(1.1); }

.pick-btn {
  margin-top: 10px;
  background: var(--or);
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font);
  transition: all .15s;
}
.pick-btn:hover { background: var(--ord); }

/* ═══════════════════════════════════════════════════════════
   CTA BANNER + ANALYZE BUTTON
═══════════════════════════════════════════════════════════ */
.cta-banner {
  background: linear-gradient(135deg, #111111, #1E1E1E);
  border-radius: var(--r);
  padding: 22px 26px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  flex-wrap: wrap;
  border: 1px solid rgba(255,255,255,.06);
}
.cta-info {}
.cta-title {
  font-size: 17px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -.02em;
  margin-bottom: 4px;
}
.cta-sub {
  font-size: 11px;
  color: rgba(255,255,255,.35);
  font-family: var(--mono);
  letter-spacing: .04em;
}

.analyze-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--or);
  color: #fff;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 800;
  padding: 15px 34px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  letter-spacing: -.01em;
  white-space: nowrap;
  transition: all .22s cubic-bezier(.22,1,.36,1);
  box-shadow: 0 4px 20px rgba(244,123,0,.5);
  animation: glow 3s ease-in-out infinite;
  user-select: none;
  -webkit-user-select: none;
  text-decoration: none;
}
.analyze-btn:hover {
  background: var(--ord);
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(244,123,0,.65);
  animation: none;
}
.analyze-btn:active {
  transform: translateY(-1px);
  box-shadow: 0 3px 12px rgba(244,123,0,.4);
}
.analyze-btn.disabled {
  background: #3A3A3A;
  color: rgba(255,255,255,.3);
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
  animation: none;
  pointer-events: none;
}
.analyze-btn .btn-arrow {
  font-size: 20px;
  transition: transform .22s;
}
.analyze-btn:hover .btn-arrow { transform: translateX(5px); }

/* ═══════════════════════════════════════════════════════════
   PROGRESS CARD
═══════════════════════════════════════════════════════════ */
.progress-card {
  background: var(--sur);
  border: 1px solid var(--bd);
  border-radius: var(--rl);
  padding: 24px;
  box-shadow: var(--sh);
  margin-bottom: 20px;
}
.progress-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.progress-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--or);
}
.spinner {
  width: 18px; height: 18px;
  border: 2.5px solid rgba(244,123,0,.2);
  border-top-color: var(--or);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
.progress-bar-bg {
  height: 6px;
  background: var(--bd);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 14px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--or), #FFB347, var(--or));
  background-size: 48px 100%;
  border-radius: 3px;
  transition: width .5s cubic-bezier(.22,1,.36,1);
  animation: progBar 1s linear infinite;
}
.progress-bar-fill.done { animation: none; background: var(--ok); }
.progress-log {
  font-family: var(--mono);
  font-size: 11px;
  line-height: 2;
  max-height: 130px;
  overflow-y: auto;
}
.log-ok   { color: var(--ok); }
.log-info { color: var(--or); }
.log-mute { color: var(--tx3); }
.log-err  { color: var(--er); }

/* ═══════════════════════════════════════════════════════════
   ERROR BOX
═══════════════════════════════════════════════════════════ */
.error-box {
  background: var(--er-bg);
  border: 1px solid var(--er-bd);
  border-radius: var(--rs);
  padding: 12px 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--er);
  margin-bottom: 18px;
  display: none;
}

/* ═══════════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════════ */
.btn {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 18px;
  border-radius: var(--rs);
  border: 1px solid var(--bd2);
  cursor: pointer;
  background: var(--sur);
  color: var(--tx);
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  text-decoration: none;
}
.btn:hover  { background: var(--sur2); }
.btn:active { transform: scale(.97); }
.btn-dark   { background: var(--dk); color: #fff; border-color: transparent; }
.btn-dark:hover { background: var(--dk2); }
.btn-ghost  { color: var(--tx3); border-color: var(--bd); background: transparent; }
.btn-ghost:hover { color: var(--tx); background: var(--sur2); }
.btn-orange { background: var(--or); color: #fff; border-color: transparent; }
.btn-orange:hover { background: var(--ord); }
.btn-sm     { padding: 7px 14px; font-size: 12px; border-radius: 8px; }
.btn-row    { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

/* ═══════════════════════════════════════════════════════════
   REPORT — HEADER
═══════════════════════════════════════════════════════════ */
.report-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--bd);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.report-title { font-size: 20px; font-weight: 800; letter-spacing: -.03em; }
.report-meta  { font-family: var(--mono); font-size: 10px; color: var(--tx3); margin-top: 3px; }
.overall-pill {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 20px;
  letter-spacing: .06em;
}

/* ═══════════════════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════════════════ */
.tab-bar {
  display: flex;
  border-bottom: 2px solid var(--bd);
  padding: 0 22px;
  background: var(--sur);
  overflow-x: auto;
  gap: 2px;
}
.tab-btn {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  padding: 13px 18px;
  border: none;
  border-bottom: 2.5px solid transparent;
  cursor: pointer;
  background: transparent;
  color: var(--tx3);
  margin-bottom: -2px;
  white-space: nowrap;
  transition: all .18s;
  letter-spacing: -.005em;
}
.tab-btn:hover { color: var(--or); }
.tab-btn.on    { color: var(--or); border-bottom-color: var(--or); }
.tab-panel     { display: none; padding: 22px; }
.tab-panel.on  { display: block; }

/* ═══════════════════════════════════════════════════════════
   ANGLE CARDS
═══════════════════════════════════════════════════════════ */
.angle-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}
.angle-card {
  background: var(--sur);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: box-shadow .22s, transform .22s;
}
.angle-card:hover { box-shadow: var(--sh2); transform: translateY(-2px); }
.angle-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  background: var(--ac, #ccc);
}
.angle-lbl { font-family: var(--mono); font-size: 9px; color: var(--tx4); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 8px; }
.angle-val { font-size: 36px; font-weight: 800; color: var(--ac, #ccc); line-height: 1; letter-spacing: -.05em; margin-bottom: 3px; }
.angle-tgt { font-family: var(--mono); font-size: 10px; color: var(--tx3); margin-bottom: 6px; }
.angle-st  { font-size: 12px; font-weight: 600; color: var(--ac, #ccc); }
.angle-bar { height: 4px; background: var(--bd); border-radius: 2px; overflow: hidden; margin-top: 10px; }
.angle-bar-fill { height: 100%; background: var(--ac, #ccc); border-radius: 2px; transition: width 1.4s cubic-bezier(.22,1,.36,1); }

/* ═══════════════════════════════════════════════════════════
   SUMMARY
═══════════════════════════════════════════════════════════ */
.summary-card {
  background: var(--sur2);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  padding: 18px 20px;
}
.summary-lbl  { font-family: var(--mono); font-size: 9px; color: var(--tx4); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 10px; }
.summary-text { font-size: 14px; line-height: 1.85; color: var(--tx2); }

/* ═══════════════════════════════════════════════════════════
   SKELETON CANVAS
═══════════════════════════════════════════════════════════ */
.skeleton-wrap {
  background: #0C0E13;
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 14px;
  border: 1px solid #1E2230;
}
.skeleton-topbar {
  background: #111420;
  padding: 11px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.skeleton-topbar span { font-family: var(--mono); font-size: 10px; color: #505878; letter-spacing: .06em; }
.skeleton-topbar .sk-tag { color: var(--or); font-weight: 500; }
#sk-canvas { width: 100%; display: block; }
.skeleton-legend {
  background: var(--sur);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  padding: 12px 16px;
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 12px;
}
.leg-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--tx3); }

/* joint angle detail grid */
.joint-detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.jd-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--sur2);
  border: 1px solid var(--bd);
  border-radius: var(--rs);
}
.jd-dot  { width: 10px; height: 10px; border-radius: 50%; background: #FF3B3B; flex-shrink: 0; }
.jd-name { font-size: 11px; color: var(--tx3); font-family: var(--mono); flex: 1; }

.pill-name { font-family: var(--mono); font-size: 9px; color: var(--tx4); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
.pill-vals { display: flex; align-items: center; justify-content: center; gap: 5px; font-family: var(--mono); font-size: 12px; }
.pill-before { color: var(--tx4); }

/* ═══════════════════════════════════════════════════════════

.report-actions {

<!-- ══════════════════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════════════════ -->
<script>
// ── CONSTANTS ────────────────────────────────────────
const TG = {
  knee_extension:  { min:25, max:35,  lbl:'膝伸展 BDC', desc:'下死點膝蓋伸展角' },
  knee_flexion:    { min:90, max:110, lbl:'膝屈曲 TDC', desc:'上死點膝蓋屈曲角' },
  hip_angle:       { min:55, max:75,  lbl:'髖關節閉合', desc:'軀幹與大腿夾角'   },
  ankle_max:       { min:90, max:115, lbl:'腳踝背屈',   desc:'最大背屈角度'     },
  shoulder_wrist:  { min:75, max:95,  lbl:'肩→腕角',   desc:'肩部到手腕角度'   },
  back_angle:      { min:35, max:50,  lbl:'背部角度',   desc:'背部與地面夾角'   },
};

const C = {
  ok: '#0B8A5C', wk: '#B86A00', er: '#C0231A', na: '#ADADAA'
};
const CBG = {
  ok: 'rgba(11,138,92,.1)', wk: 'rgba(184,106,0,.1)', er: 'rgba(192,35,26,.1)', na: '#f5f5f5'
};
const LL = { ok:'✓ 達標', wk:'△ 偏差', er:'✕ 超出', na:'—' };

function gst(v, t) {
  if (v == null) return 'na';
  if (v >= t.min && v <= t.max) return 'ok';
  if (v < t.min - 10 || v > t.max + 10) return 'er';
  return 'wk';
}

// ── STATE ────────────────────────────────────────────
const S = {
  step: 1,
  bdcURL: null, bdcImg: null,
  tdcURL: null, tdcImg: null,
  result: null,
  error: '',
  tab: 'angles',
  pct: 0,
  logs: [],
  sim: { sh:0, sb:0, st:0, sl:0 },
};

function set(p) {
  Object.assign(S, p);
  render();
  afterRender();
}

function afterRender() {
  if (S.tab === 'visual' && S.result && S.bdcImg) requestAnimationFrame(drawSkeleton);
  if (S.tab === 'sim'    && S.result)             requestAnimationFrame(drawSim);
}

// ── RENDER ───────────────────────────────────────────
function render() {
  renderStepBar();
  renderError();
  document.getElementById('view-1').style.display = S.step === 1 ? '' : 'none';
  document.getElementById('view-2').style.display = S.step === 2 ? '' : 'none';
  document.getElementById('view-3').style.display = S.step === 3 ? '' : 'none';
  if (S.step === 1) renderUpload();
  if (S.step === 2) renderProgress();
  if (S.step === 3) renderReport();
}

function renderStepBar() {
  const steps = [
    { n:1, l:'上傳照片' },
    { n:2, l:'人工智慧分析' },
    { n:3, l:'查看報告' },
  ];
  document.getElementById('step-bar').innerHTML = steps.map((s, i) => {
    const cs = S.step > s.n ? 'done' : S.step === s.n ? 'active' : 'idle';
    const cl = S.step >= s.n ? 'active' : 'idle';
    const conn = i < steps.length - 1
      ? `<div class="step-connector${S.step > s.n ? ' done' : ''}"></div>` : '';
    return `<div class="step-item">
      <div class="step-circle ${cs}">${S.step > s.n ? '✓' : s.n}</div>
      <div class="step-label ${cl}">${s.l}</div>
    </div>${conn}`;
  }).join('');
}

function renderError() {
  const el = document.getElementById('error-box');
  if (S.error) { el.style.display = ''; el.textContent = '⚠ ' + S.error; }
  else el.style.display = 'none';
}

// ── VIEW 1: UPLOAD ───────────────────────────────────
function renderUpload() {
  const el = document.getElementById('view-1');
  const can  = S.bdcURL || S.tdcURL;
  const has2 = S.bdcURL && S.tdcURL;

  function slot(key, cls, badge, name, icon, desc) {
    const url = S[key + 'URL'];
    return `<div class="upload-slot${url ? ' filled' : ''}" id="slot-${key}" data-slot="${key}">
      <div class="slot-badge-bar ${cls}">
        <div class="slot-badge ${cls}">${badge}</div>
        <div class="slot-name">${name}</div>
      </div>
      ${url
        ? `<img class="slot-preview" src="${url}" alt="${key}">
           <button class="slot-remove" data-rm="${key}">✕</button>`
        : `<div class="slot-empty">
             <div class="slot-icon">${icon}</div>
             <div class="slot-desc">${desc}</div>
             <div class="slot-hint">點擊或拖放</div>
             <button class="pick-btn" data-pick="${key}">選擇圖片</button>
           </div>`
      }
      <input type="file" accept="image/*" id="fi-${key}">
    </div>`;
  }

  el.innerHTML = `
  <div class="card fade-up">
    <div class="card-head">
      <div class="card-title">📸 上傳騎乘照片</div>
      <span style="font-family:var(--mono);font-size:10px;color:var(--tx3)">JPG / PNG · 側面拍攝</span>
    </div>
    <div class="card-body">
      <div class="instr-box">
        <div class="instr-title">📌 拍攝說明</div>
        <div class="instr-steps">
          <div class="instr-step"><div class="instr-num">1</div><div>從<b>側面</b>拍攝（左側或右側均可，兩張保持同一側）</div></div>
          <div class="instr-step"><div class="instr-num">2</div><div><b>BDC 圖</b>：曲柄在 6 點鐘下死點，用於測量膝伸展角與座高</div></div>
          <div class="instr-step"><div class="instr-num">3</div><div><b>TDC 圖</b>：曲柄在 1 點鐘近上死點，用於測量膝屈曲角與髖角</div></div>
          <div class="instr-step"><div class="instr-num">4</div><div>兩張照片上傳完成後，按下方橙色按鈕開始人工智慧分析（約 15-25 秒）</div></div>
        </div>
      </div>

      <div class="upload-grid">
        ${slot('bdc','bdc','BDC','下死點 — 曲柄 6 點鐘','🦵','曲柄朝下<br>測量膝伸展角度')}
        ${slot('tdc','tdc','TDC','近上死點 — 曲柄 1 點鐘','🔄','曲柄朝前上方<br>測量膝屈曲與髖角')}
      </div>

      <div class="cta-banner">
        <div class="cta-info">
          <div class="cta-title">${has2 ? '✓ 兩張照片就緒，可以開始分析' : can ? '已上傳一張，建議補上另一張以獲得完整分析' : '請上傳騎乘側面照片'}</div>
          <div class="cta-sub">${has2 ? 'BDC + TDC 雙幀 · Bottom-Up 完整分析' : can ? '單幀模式 · 部分角度可能無法測量' : 'Bottom-Up Protocol · Claude AI Vision'}</div>
        </div>
        <div class="analyze-btn${can ? '' : ' disabled'}" id="analyze-btn" role="button" tabindex="${can ? '0' : '-1'}">
          <span>開始人工智慧分析</span>
          <span class="btn-arrow">→</span>
        </div>
      </div>
    </div>
  </div>`;

  bindUploadEvents();
}

function bindUploadEvents() {
  // Analyze button
  const btn = document.getElementById('analyze-btn');
  if (btn && !btn.classList.contains('disabled')) {
    btn.onclick = startAnalysis;
    btn.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') startAnalysis(); };
  }

  // Pick buttons
  document.querySelectorAll('[data-pick]').forEach(b => {
    b.onclick = e => { e.stopPropagation(); document.getElementById('fi-' + b.dataset.pick)?.click(); };
  });

  // File inputs
  ['bdc', 'tdc'].forEach(key => {
    const fi = document.getElementById('fi-' + key);
    if (fi) fi.onchange = e => { if (e.target.files[0]) loadImg(key, e.target.files[0]); };
  });

  // Remove buttons
  document.querySelectorAll('[data-rm]').forEach(b => {
    b.onclick = e => {
      e.stopPropagation();
      const k = b.dataset.rm;
      S[k + 'URL'] = null; S[k + 'Img'] = null;
      set({ error: '' });
    };
  });

  // Slot click + drag-drop
  document.querySelectorAll('[data-slot]').forEach(slot => {
    const key = slot.dataset.slot;
    slot.onclick = () => { if (!S[key + 'URL']) document.getElementById('fi-' + key)?.click(); };
    slot.ondragover  = e => { e.preventDefault(); slot.classList.add('drag'); };
    slot.ondragleave = () => slot.classList.remove('drag');
    slot.ondrop = e => {
      e.preventDefault();
      slot.classList.remove('drag');
      const f = e.dataTransfer.files[0];
      if (f) loadImg(key, f);
    };
  });
}

// ── VIEW 2: PROGRESS ─────────────────────────────────
function renderProgress() {
  const el = document.getElementById('view-2');
  const pvs = [];
  if (S.bdcURL) pvs.push(`<div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--tx3);margin-bottom:6px;letter-spacing:.06em">BDC — 下死點</div>
    <img src="${S.bdcURL}" style="width:100%;max-height:200px;object-fit:cover;border-radius:12px;border:1px solid var(--bd)">
  </div>`);
  if (S.tdcURL) pvs.push(`<div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--tx3);margin-bottom:6px;letter-spacing:.06em">TDC — 近上死點</div>
    <img src="${S.tdcURL}" style="width:100%;max-height:200px;object-fit:cover;border-radius:12px;border:1px solid var(--bd)">
  </div>`);

  const logHTML = S.logs.map(l => `<div class="log-${l.c}">${esc(l.m)}</div>`).join('');

  el.innerHTML = `
  <div class="progress-card fade-in">
    <div class="progress-header">
      <div class="spinner"></div>
      <div class="progress-title">人工智慧分析進行中…</div>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill${S.pct >= 100 ? ' done' : ''}" id="pbar" style="width:${S.pct}%"></div>
    </div>
    <div class="progress-log" id="plog">${logHTML}</div>
  </div>
  <div class="card fade-in" style="margin-top:0">
    <div class="card-head">
      <div class="card-title">🖼 已上傳照片</div>
      <button class="btn btn-ghost btn-sm" id="btn-back">← 返回</button>
    </div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:${pvs.length > 1 ? '1fr 1fr' : '1fr'};gap:16px">
        ${pvs.join('')}
      </div>
    </div>
  </div>`;

  document.getElementById('btn-back')?.addEventListener('click', () =>
    set({ step:1, error:'', logs:[], pct:0 })
  );
}

// ── VIEW 3: REPORT ───────────────────────────────────
function renderReport() {
  if (!S.result) return;
  const el = document.getElementById('view-3');
  const r   = S.result;
  const ang = r.angles;
  const oc  = r.overall === 'good' ? C.ok : r.overall === 'needs_adjustment' ? C.wk : C.er;
  const ol  = r.overall === 'good' ? '✓ 姿勢良好' : r.overall === 'needs_adjustment' ? '⚠ 需要調整' : '✕ 需要改善';

  // ── ANGLE CARDS ──
  const angleCards = Object.entries(TG).map(([k, t]) => {
    const v   = ang[k];
    const st  = gst(v, t);
    const col = C[st];
    const pct = v != null ? Math.min(100, Math.max(0, ((v - t.min) / (t.max - t.min)) * 100)) : 0;
    return `<div class="angle-card" style="--ac:${col}">
      <div class="angle-lbl">${t.lbl}</div>
      <div class="angle-val">${v != null ? v + '°' : '—'}</div>
      <div class="angle-tgt">目標 ${t.min}–${t.max}°</div>
      <div class="angle-st">${LL[st]}</div>
      <div class="angle-bar"><div class="angle-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  // ── JOINT DETAIL ──
  const jmap = [
    { key:'knee_extension',  lbl:'膝 BDC' },
    { key:'hip_angle',       lbl:'髖關節' },
    { key:'shoulder_wrist',  lbl:'肩→腕' },
    { key:'ankle_max',       lbl:'腳踝'   },
  ];
  const jdHTML = jmap.map(ja => {
    const v = ang[ja.key]; const t = TG[ja.key];
    const st = gst(v, t); const col = C[st];
    return `<div class="jd-item">
      <div class="jd-dot"></div>
      <div class="jd-name">${ja.lbl}</div>
      <div class="jd-val" style="color:${col}">${v != null ? v + '°' : '—'}</div>
      <div class="jd-st" style="color:${col}">${LL[st]}</div>
    </div>`;
  }).join('');

  // ── RECS ──
  const recs = [];
  const addRec = (ico, st, title, desc, act) => recs.push({ ico, st, title, desc, act });

  const ankle = ang.ankle_max;
  if (ankle != null) {
    if      (ankle < 90)  addRec('🦶','er','Layer 1：腳踝背屈不足',  `腳踝角 ${ankle}° < 90°。建議 Cleat 後退 2-3mm，並加強踝關節伸展訓練。`, 'Cleat 後移 2-3mm');
    else if (ankle > 115) addRec('🦶','wk','Layer 1：腳踝過度背屈',  `腳踝角 ${ankle}° > 115°，Cleat 可能過後。確認前後位置。`, '確認 Cleat 位置');
    else                  addRec('🦶','ok','Layer 1：腳踝背屈正常 ✓', `腳踝角 ${ankle}°，符合 90-115° 目標範圍，Cleat 位置良好。`, null);
  }
  const knee = ang.knee_extension;
  if (knee != null) {
    if (knee < 25) {
      const d = Math.round((25 - knee) * 2.8);
      addRec('🦵','er','Layer 2：座高過高', `膝伸展 ${knee}° < 25°，踩踏末端膝蓋過伸，骨盆可能左右搖擺。建議降低座高約 ${d}mm。`, `降座高 ${d}mm`);
    } else if (knee > 35) {
      const d = Math.round((knee - 35) * 2.8);
      addRec('🦵','er','Layer 2：座高不足', `膝伸展 ${knee}° > 35°，踩踏效率降低，膝關節負擔增加。建議升高座高約 ${d}mm。`, `升座高 ${d}mm`);
    } else {
      addRec('🦵','ok','Layer 2：座高設定良好 ✓', `膝伸展 ${knee}°，位於 25-35° 最佳範圍，踩踏效率與膝關節健康達到平衡。`, null);
    }
  }
  const hip = ang.hip_angle;
  if (hip != null) {
    if      (hip < 55) addRec('🍑','er','Layer 3：髖部過度閉合',  `髖角 ${hip}° < 55°，髖屈肌活動受限。建議縮短龍頭或降低把手高度。`, '縮短龍頭 / 降低把高');
    else if (hip > 75) addRec('🍑','wk','Layer 3：上半身過度直立', `髖角 ${hip}° > 75°，氣動效益降低。考慮前移座位 5-10mm 或加長龍頭。`, '前移座位 5-10mm');
    else               addRec('🍑','ok','Layer 3：髖關節角度理想 ✓',`髖角 ${hip}°，55-75° 最佳範圍，功率輸出與舒適性兼顧。`, null);
  }
  const sh = ang.shoulder_wrist;
  if (sh != null) {
    if      (sh < 75) addRec('💪','wk','Layer 4：手臂承重偏大', `肩腕角 ${sh}° < 75°，手腕與肩頸壓力較大。建議加墊片 5-10mm。`, '加墊片 5-10mm');
    else if (sh > 95) addRec('💪','wk','Layer 4：把手位置偏高', `肩腕角 ${sh}° > 95°，影響氣動效益。可考慮減少墊片。`, '減墊片 5mm');
    else              addRec('💪','ok','Layer 4/5：上半身姿勢良好 ✓',`肩腕角 ${sh}°，手臂承重分配合理，無明顯壓力風險。`, null);
  }
  if (ang.back_angle != null && ang.back_angle > 50)
    addRec('🏋️','wk','Layer 5：背部角度偏大', `背部角度 ${ang.back_angle}° > 50°，上半身偏直立。競技需求可配合龍頭調整。`, '評估龍頭長度');

  (r.bottom_up_issues || []).forEach(iss => {
    if (iss && iss.length > 3) addRec('🤖','wk','AI 補充觀察', iss, null);
  });

  const recHTML = recs.map(rec => `<div class="rec-item">
    <div class="rec-icon" style="background:${CBG[rec.st]}">${rec.ico}</div>
    <div class="rec-body">
      <div class="rec-title">${rec.title}</div>
      <div class="rec-desc">${rec.desc}</div>
      ${rec.act ? `<div class="rec-action">→ ${rec.act}</div>` : ''}
    </div>
  </div>`).join('');

  // ── SIM ──
  const sim = S.sim;
  const sliders = [['sh','座高 (mm)',-30,30,1],['sb','座位前後 (mm)',-20,20,1],['st','龍頭高度 (mm)',-25,25,5],['sl','龍頭長度 (mm)',-20,20,5]];
  const ctrlHTML = sliders.map(([k, lbl, mn, mx, sp]) => `<div class="slider-group">
    <div class="slider-row">
      <span>${lbl}</span>
      <span class="slider-val">${sim[k] > 0 ? '+' : ''}${sim[k]}</span>
    </div>
    <input type="range" min="${mn}" max="${mx}" value="${sim[k]}" step="${sp}" data-sim="${k}">
  </div>`).join('');

  const pills = [
    { k:'knee_extension',  adj: (ang.knee_extension  || 30) + Math.round(-sim.sh * 0.5) },
    { k:'hip_angle',       adj: (ang.hip_angle        || 65) + Math.round(-sim.sb * 0.3) },
    { k:'shoulder_wrist',  adj: (ang.shoulder_wrist   || 82) + Math.round(-sim.st * 0.15) },
  ].map(({ k, adj }) => {
    const t = TG[k]; const orig = ang[k]; if (!orig) return '';
    const st = gst(adj, t); const col = C[st];
    return `<div class="pill-card">
      <div class="pill-name">${t.lbl}</div>
      <div class="pill-vals">
        <span class="pill-before">${orig}°</span>
        <span class="pill-arrow">→</span>
        <span class="pill-after" style="color:${col}">${adj}°</span>
      </div>

  }).join('');

  const tabContent = {
    angles: `<div class="angle-grid">${angleCards}</div>
      <div class="summary-card">
        <div class="summary-lbl">AI 分析摘要</div>
        <div class="summary-text">${r.summary_zh || '—'}</div>
      </div>`,

    visual: `<div class="skeleton-wrap">
        <div class="skeleton-topbar">
          <span>關節標示 · BDC 下死點照片</span>
          <span class="sk-tag">白線骨架 · 紅點關節 · 角度標示</span>
        </div>
        <canvas id="sk-canvas"></canvas>
      </div>
      <div class="skeleton-legend">
        <div class="leg-item"><svg width="22" height="8"><line x1="0" y1="4" x2="22" y2="4" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>骨架連線</div>
        <div class="leg-item"><svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#FF3B3B"/></svg>關節點</div>
        <div class="leg-item"><svg width="12" height="12"><circle cx="6" cy="6" r="5.5" fill="none" stroke="#0B8A5C" stroke-width="1.5"/></svg>達標</div>
        <div class="leg-item"><svg width="12" height="12"><circle cx="6" cy="6" r="5.5" fill="none" stroke="#B86A00" stroke-width="1.5"/></svg>偏差</div>
        <div class="leg-item"><svg width="12" height="12"><circle cx="6" cy="6" r="5.5" fill="none" stroke="#C0231A" stroke-width="1.5"/></svg>超出</div>
      </div>
      <div class="joint-detail-grid">${jdHTML}</div>`,

    recs: `<div class="rec-list">${recHTML}</div>`,

    sim: `<div class="sim-layout">
      <div class="sim-controls">
        <div class="sim-ctrl-title">即時調整模擬</div>
        ${ctrlHTML}
        <button class="btn btn-ghost btn-sm" id="btn-sim-reset" style="width:100%;justify-content:center">↺ 重置所有</button>
      </div>
      <div class="sim-view">
        <div class="sim-canvases">
          <div class="sim-canvas-wrap">
            <canvas id="sim-before"></canvas>
            <div class="sim-canvas-tag" style="color:rgba(255,255,255,.5)">CURRENT</div>
          </div>
          <div class="sim-canvas-wrap">
            <canvas id="sim-after"></canvas>
            <div class="sim-canvas-tag" style="color:var(--or)">ADJUSTED</div>
          </div>
        </div>
        <div class="pill-row">${pills}</div>
      </div>
    </div>`,
  };

  el.innerHTML = `
  <div class="card fade-up">
    <div class="report-header">
      <div>
        <div class="report-title">Fit 分析報告</div>
        <div class="report-meta">${new Date().toLocaleString('zh-TW')} · 信心度 ${r.confidence || '—'}%</div>
      </div>
      <div class="overall-pill" style="background:${oc}18;color:${oc};border:1.5px solid ${oc}50">${ol}</div>
    </div>

    <div class="tab-bar">
      ${[['angles','📐 角度分析'],['visual','🦴 關節標示'],['recs','💡 調整建議'],['sim','🔬 姿勢模擬']].map(([id, lbl]) =>
        `<button class="tab-btn${S.tab === id ? ' on' : ''}" data-tab="${id}">${lbl}</button>`
      ).join('')}
    </div>

    ${['angles','visual','recs','sim'].map(id =>
      `<div class="tab-panel${S.tab === id ? ' on' : ''}" id="tp-${id}">${tabContent[id]}</div>`
    ).join('')}

    <div class="report-actions">
      <button class="btn btn-ghost btn-sm" id="btn-new">← 分析新照片</button>
      <button class="btn btn-sm" id="btn-redo">重新分析</button>
      <button class="btn btn-orange btn-sm" id="btn-export">📄 匯出報告</button>
    </div>
  </div>`;

  // Bind report events
  document.querySelectorAll('.tab-btn[data-tab]').forEach(b =>
    b.addEventListener('click', () => set({ tab: b.dataset.tab }))
  );
  document.getElementById('btn-new')?.addEventListener('click', resetAll);
  document.getElementById('btn-redo')?.addEventListener('click', () => set({ step:1 }));
  document.getElementById('btn-export')?.addEventListener('click', exportReport);
  document.getElementById('btn-sim-reset')?.addEventListener('click', () =>

  document.querySelectorAll('[data-sim]').forEach(inp =>
    inp.addEventListener('input', () =>
      set({ sim: { ...S.sim, [inp.dataset.sim]: +inp.value } })

}

// ── IMAGE LOAD ───────────────────────────────────────
function loadImg(key, file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      S[key + 'Img'] = img;
      set({ [key + 'URL']: e.target.result, error: '' });
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── ANALYSIS ─────────────────────────────────────────
async function startAnalysis() {
  if (!S.bdcURL && !S.tdcURL) { set({ error: '請先上傳至少一張照片' }); return; }

  // Switch to step 2 immediately
  S.step = 2;
  S.error = '';
  S.pct   = 5;
  S.logs  = [{ m: '▶ 照片就緒，準備傳送…', c: 'info' }];
  render();

  // Progress helpers — update DOM directly without full re-render
  function addLog(m, c = 'info') {
    S.logs.push({ m, c });
    const el = document.getElementById('plog');
    if (el) el.innerHTML = S.logs.map(l => `<div class="log-${l.c}">${esc(l.m)}</div>`).join('');
  }
  function setPct(p) {
    S.pct = p;
    const el = document.getElementById('pbar');
    if (el) el.style.width = p + '%';
  }

  const has2 = S.bdcURL && S.tdcURL;

  try {
    addLog('⟳ 編碼圖片…', 'info'); setPct(15);

    const content = [];
    if (S.bdcURL) {
      content.push({ type:'image', source:{ type:'base64', media_type:'image/jpeg', data: S.bdcURL.split(',')[1] } });
      content.push({ type:'text', text: has2 ? '圖一 BDC（曲柄 6 點鐘下死點）：' : '騎乘側面照片：' });
    }
    if (S.tdcURL) {
      content.push({ type:'image', source:{ type:'base64', media_type:'image/jpeg', data: S.tdcURL.split(',')[1] } });
      content.push({ type:'text', text: '圖二 TDC（曲柄 1 點鐘近上死點）：' });
    }
    content.push({ type:'text', text: buildPrompt(has2) });

    addLog('⟳ 傳送至 AI 分析伺服器…', 'info'); setPct(32);

    // ★ 呼叫 /api/analyze（Vercel Serverless proxy）
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1200,
        messages: [{ role: 'user', content }],
      }),
    });

    setPct(70); addLog('⟳ 解析生物力學結果…', 'info');

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.error?.message || `伺服器錯誤 HTTP ${resp.status}`);
    }

    const data = await resp.json();
    const raw  = data.content.map(b => b.text || '').join('');
    const m    = raw.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('AI 未回傳有效 JSON，請重試');

    const parsed = JSON.parse(m[0]);
    if (!parsed.angles) throw new Error('回傳格式不完整，請重試');

    setPct(95); addLog('⟳ 生成報告…', 'info');
    setPct(100); addLog('✓ 分析完成！', 'ok');

    setTimeout(() => set({ result: parsed, step: 3, error: '', tab: 'angles' }), 800);

  } catch (err) {
    addLog('✕ 錯誤：' + err.message, 'err');
    setTimeout(() => set({ step:1, error: '分析失敗：' + err.message, logs:[], pct:0 }), 2500);
  }
}

function buildPrompt(has2) {
  return `你是專業 Bikefit 分析師，遵循 Bikefit.com Bottom-Up 原則（腳踝→膝蓋→髖部→上半身）。

${has2
  ? '請結合圖一（BDC 6點鐘下死點）與圖二（TDC 1點鐘近上死點）進行完整分析。'
  : '請分析此側面騎乘照片，估算所有可見角度。'}

skeleton 座標說明：以 BDC 圖為基準，x/y 均為 0-1 比例（左上角=0,0，右下角=1,1）。請精確標記各關節在照片中的實際位置。

只回傳以下 JSON，不要任何說明文字或 markdown 符號：

{"angles":{"knee_extension":<BDC膝伸展°整數或null>,"knee_flexion":<TDC膝屈曲°>,"hip_angle":<髖角°>,"ankle_max":<腳踝背屈°>,"shoulder_wrist":<肩腕角°>,"back_angle":<背部角°>},"skeleton":{"hip":{"x":<0-1>,"y":<0-1>},"knee":{"x":<0-1>,"y":<0-1>},"ankle":{"x":<0-1>,"y":<0-1>},"shoulder":{"x":<0-1>,"y":<0-1>},"elbow":{"x":<0-1>,"y":<0-1>},"wrist":{"x":<0-1>,"y":<0-1>},"neck":{"x":<0-1>,"y":<0-1>},"foot":{"x":<0-1>,"y":<0-1>}},"overall":"good"或"needs_adjustment"或"poor","confidence":<0-100整數>,"bottom_up_issues":["<繁中問題1>","<繁中問題2>"],"summary_zh":"<3-4句繁中摘要，說明主要發現與調整建議>"}`;
}

// ── SKELETON CANVAS ──────────────────────────────────
function drawSkeleton() {
  const c = document.getElementById('sk-canvas');
  if (!c || !S.bdcImg || !S.result) return;
  const ctx = c.getContext('2d');
  const IMG = S.bdcImg;
  const cw  = c.parentElement?.clientWidth || 600;
  const sc  = cw / IMG.width;
  c.width   = Math.round(IMG.width  * sc);
  c.height  = Math.round(IMG.height * sc);
  const W = c.width, H = c.height;

  ctx.drawImage(IMG, 0, 0, W, H);

  const sk = S.result.skeleton;
  if (!sk) return;

  // 座標換算
  const pts = {};
  for (const [name, co] of Object.entries(sk)) {
    if (co && co.x != null && co.y != null)
      pts[name] = { x: co.x * W, y: co.y * H };
  }

  const lw    = Math.max(2.5, W / 200);
  const dotR  = Math.max(7,   W / 95);
  const ringR = dotR + Math.max(3, W / 170);
  const arcR  = Math.max(22,  W / 28);
  const fs    = Math.max(12,  W / 42);

  // White bones with shadow
  ctx.save();
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.shadowColor = 'rgba(0,0,0,.55)';
  ctx.shadowBlur  = 5;
  [['neck','shoulder'],['shoulder','elbow'],['elbow','wrist'],
   ['shoulder','hip'],['hip','knee'],['knee','ankle'],['ankle','foot']].forEach(([a, b]) => {
    if (!pts[a] || !pts[b]) return;
    ctx.beginPath(); ctx.moveTo(pts[a].x, pts[a].y); ctx.lineTo(pts[b].x, pts[b].y); ctx.stroke();
  });
  ctx.shadowBlur = 0;
  ctx.restore();

  // Angle arcs + labels
  const ang = S.result.angles;
  [['knee','hip','ankle','knee_extension'],
   ['hip','shoulder','knee','hip_angle'],
   ['shoulder','elbow','hip','shoulder_wrist'],
   ['ankle','knee','foot','ankle_max']].forEach(([j, a, b, key]) => {
    if (!pts[j] || !pts[a] || !pts[b]) return;
    const v = ang[key]; if (v == null) return;
    const t = TG[key]; const st = gst(v, t); const col = C[st];
    const a1 = Math.atan2(pts[a].y - pts[j].y, pts[a].x - pts[j].x);
    const a2 = Math.atan2(pts[b].y - pts[j].y, pts[b].x - pts[j].x);
    ctx.save();
    ctx.beginPath(); ctx.arc(pts[j].x, pts[j].y, arcR, a1, a2, false);
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(2, lw * .85);
    ctx.setLineDash([3, 2]); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();
    const ma = (a1 + a2) / 2;
    const ld = arcR + Math.max(18, W / 32);
    const lx = pts[j].x + Math.cos(ma) * ld;
    const ly = pts[j].y + Math.sin(ma) * ld;
    const lbl = v + '°';
    ctx.save();
    ctx.font = `bold ${fs}px 'DM Mono', monospace`;
    const tw = ctx.measureText(lbl).width;
    const pad = 6, bh = fs + 10;
    ctx.fillStyle = 'rgba(0,0,0,.82)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(lx - tw/2 - pad, ly - bh/2, tw + pad*2, bh, 5);
    else ctx.rect(lx - tw/2 - pad, ly - bh/2, tw + pad*2, bh);
    ctx.fill();
    ctx.fillStyle = col; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(lbl, lx, ly);
    ctx.restore();
  });

  // Red dots (top layer)
  for (const [, p] of Object.entries(pts)) {
    ctx.save();
    ctx.beginPath(); ctx.arc(p.x, p.y, ringR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,59,59,.2)'; ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.beginPath(); ctx.arc(p.x, p.y, dotR, 0, Math.PI * 2);
    ctx.fillStyle = '#FF3B3B'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.75)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();
  }
}

// ── SIM CANVAS ───────────────────────────────────────
function drawSim() {
  drawStick('sim-before', false);
  drawStick('sim-after',  true);
}

function drawStick(id, isAfter) {
  const c = document.getElementById(id);
  if (!c || !S.result?.skeleton) return;
  const ctx = c.getContext('2d'), W = 260, H = 240;
  c.width = W; c.height = H;
  ctx.fillStyle = '#0C0E13'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,.04)'; ctx.lineWidth = .5;
  for (let x = 0; x < W; x += 20) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 20) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const sk = S.result.skeleton;
  const pts = {};
  for (const [n, co] of Object.entries(sk)) {
    if (co) pts[n] = { x: co.x * W * .34 + W * .33, y: co.y * H * .34 + H * .07 };
  }

  if (isAfter) {
    const mm = .00075;
    ['hip','knee','ankle','foot'].forEach(j =>     { if (pts[j]) pts[j].y += -S.sim.sh * mm * H * 1.5; });
    ['hip','shoulder','neck','elbow','wrist'].forEach(j => { if (pts[j]) pts[j].x += S.sim.sb * mm * W * .25; });
    ['shoulder','neck','elbow','wrist'].forEach(j => { if (pts[j]) pts[j].y += -S.sim.st * mm * H * 1.1; });
    ['wrist','elbow'].forEach(j =>                 { if (pts[j]) pts[j].x += S.sim.sl * mm * W; });
  }

  const gy = (pts.ankle?.y || H * .8) + 14;
  ctx.strokeStyle = 'rgba(255,255,255,.08)'; ctx.lineWidth = 1; ctx.setLineDash([5, 4]);
  ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); ctx.setLineDash([]);

  ctx.strokeStyle = isAfter ? 'rgba(255,255,255,.92)' : 'rgba(255,255,255,.32)';
  ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  [['neck','shoulder'],['shoulder','elbow'],['elbow','wrist'],
   ['shoulder','hip'],['hip','knee'],['knee','ankle'],['ankle','foot']].forEach(([a, b]) => {
    if (pts[a] && pts[b]) {
      ctx.beginPath(); ctx.moveTo(pts[a].x, pts[a].y); ctx.lineTo(pts[b].x, pts[b].y); ctx.stroke();
    }
  });

  const dc = isAfter ? '#FF3B3B' : 'rgba(255,59,59,.4)';
  for (const [, p] of Object.entries(pts)) {
    ctx.beginPath(); ctx.arc(p.x, p.y, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = dc; ctx.fill();
    if (isAfter) { ctx.strokeStyle = 'rgba(255,255,255,.6)'; ctx.lineWidth = 1.2; ctx.stroke(); }
  }

  ctx.fillStyle = isAfter ? 'rgba(255,255,255,.75)' : 'rgba(255,255,255,.3)';
  ctx.font = 'bold 9px monospace'; ctx.textAlign = 'left';
  ctx.fillText(isAfter ? 'ADJUSTED' : 'CURRENT', 8, 15);
}

// ── EXPORT ───────────────────────────────────────────
function exportReport() {
  if (!S.result) return;
  const r = S.result, a = r.angles;
  const lines = [
    'Orange Fruit — Free Your Fit',
    'AI BikeFit 分析報告',
    '══════════════════════════════════',
    `生成時間：${new Date().toLocaleString('zh-TW')}`,
    `整體評估：${r.overall === 'good' ? '姿勢良好' : r.overall === 'needs_adjustment' ? '需要調整' : '需要改善'} · 信心度 ${r.confidence || '—'}%`,
    '',
    '【Bottom-Up 角度量測】',
    '──────────────────────────────────',
    ...Object.entries(a).map(([k, v]) => {
      const t = TG[k]; if (!t || v == null) return null;
      const st = gst(v, t);
      return `${t.lbl.padEnd(10)}：${String(v + '°').padStart(5)}  (目標 ${t.min}-${t.max}°)  ${LL[st]}`;
    }).filter(Boolean),
    '',
    '【AI 分析摘要】',
    '──────────────────────────────────',
    r.summary_zh || '—',
    '',
    '【Bottom-Up 問題清單】',
    '──────────────────────────────────',
    ...(r.bottom_up_issues || []).map((s, i) => `${i + 1}. ${s}`),
    '',
    '══════════════════════════════════',
    'Orange Fruit · Free Your Fit',
    'Powered by Claude AI · Bottom-Up Protocol',
  ];
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const el   = document.createElement('a');
  el.href    = URL.createObjectURL(blob);
  el.download = `OrangeFruit_BikeFit_${Date.now()}.txt`;
  el.click();
}

// ── RESET ────────────────────────────────────────────
function resetAll() {
  S.bdcImg = null; S.tdcImg = null;
  set({
    step:1, error:'',
    bdcURL: null, tdcURL: null,
    result: null, tab: 'angles',
    logs: [], pct: 0,
    sim: { sh:0, sb:0, st:0, sl:0 },
  });
}

// ── UTILS ────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── INIT ─────────────────────────────────────────────
render();
</script>
