<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange Fruit — AI BikeFit Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   TOKENS & BASE
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --or: #F47B00; --ord: #C96200; --orl: #FFF8F0; --orb: #F5C060;
  --dk: #0F0F0F; --dk2: #1A1A1A; --dk3: #252525;
  --bg: #F7F6F4; --sur: #FFFFFF; --sur2: #F9F9F8; --sur3: #F2F1EF;
  --bd: #E8E8E6; --bd2: #D8D8D5; --bd3: #C8C8C4;
  --tx: #0F0F0F; --tx2: #3A3A3A; --tx3: #7A7A78; --tx4: #ADADAA;
  --ok: #0B8A5C; --er: #C0231A;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'DM Mono', 'Courier New', monospace;
  --r: 16px; --rl: 20px;
  --sh: 0 1px 3px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.06);
}

body { font-family: var(--font); background: var(--bg); color: var(--tx); min-height: 100vh; line-height: 1.5; }

/* ═══════════════════════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════════════════════ */
.navbar { background: var(--dk); height: 66px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 100; }
.nav-name { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.03em; }
.nav-name span { color: var(--or); }
.nav-badge { font-family: var(--mono); font-size: 10px; padding: 4px 12px; border-radius: 20px; background: rgba(244,123,0,0.12); color: var(--or); border: 1px solid rgba(244,123,0,0.35); }

/* ═══════════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════════ */
.page { max-width: 1020px; margin: 0 auto; padding: 32px 20px 80px; }
.step-bar { display: flex; align-items: center; background: var(--sur); border: 1px solid var(--bd); border-radius: var(--r); padding: 16px 24px; margin-bottom: 24px; box-shadow: var(--sh); }
.step-item { display: flex; align-items: center; gap: 8px; }
.step-circle { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.step-circle.active { background: var(--dk); color: #fff; }
.step-circle.idle { background: var(--bd); color: var(--tx4); }
.step-connector { flex: 1; height: 2px; background: var(--bd); margin: 0 10px; }

.card { background: var(--sur); border: 1px solid var(--bd); border-radius: var(--rl); overflow: hidden; margin-bottom: 20px; box-shadow: var(--sh); animation: fadeUp .35s ease-out; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

.card-head { padding: 16px 22px; border-bottom: 1px solid var(--bd); font-weight: 700; }
.card-body { padding: 22px; }

.upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }
.upload-slot { border: 2px dashed var(--bd2); border-radius: var(--r); overflow: hidden; cursor: pointer; background: var(--sur2); min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
.slot-preview { width: 100%; height: 220px; object-fit: cover; }

.analyze-btn { width: 100%; background: var(--or); color: #fff; font-size: 16px; font-weight: 800; padding: 15px; border-radius: 12px; border: none; cursor: pointer; }
.analyze-btn.disabled { background: #ccc; cursor: not-allowed; }

.footer { background: var(--dk); padding: 20px 32px; display: flex; justify-content: space-between; color: rgba(255,255,255,0.4); font-size: 12px; }

@media (max-width: 600px) { .upload-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-name"><span>Orange</span> Fruit</div>
  <div class="nav-badge">GEMINI 1.5 FLASH AI</div>
</nav>

<div class="page" id="page">
  <div class="step-bar" id="step-bar"></div>
  <div id="view-1"></div>
  <div id="view-2" style="display:none"></div>
  <div id="view-3" style="display:none"></div>
</div>

<footer class="footer">
  <div>Orange Fruit AI · v3.2</div>
  <div style="color:var(--or)">Powered by Google Gemini AI</div>
</footer>

<script>
// ── 狀態管理 ──────────────────────────────────────────
let S = {
  step: 1,
  bdcURL: null,
  tdcURL: null,
  loading: false,
  result: null
};

// ── 核心渲染函式 ──────────────────────────────────────
function render() {
  const stepBar = document.getElementById('step-bar');
  const v1 = document.getElementById('view-1');
  const v2 = document.getElementById('view-2');
  const v3 = document.getElementById('view-3');

  if (!stepBar || !v1) return; // 安全檢查

  // 更新步驟條
  stepBar.innerHTML = `
    <div class="step-item"><div class="step-circle ${S.step>=1?'active':'idle'}">1</div> 上傳</div>
    <div class="step-connector"></div>
    <div class="step-item"><div class="step-circle ${S.step>=2?'active':'idle'}">2</div> 分析</div>
    <div class="step-connector"></div>
    <div class="step-item"><div class="step-circle ${S.step>=3?'active':'idle'}">3</div> 報告</div>
  `;

  // 切換視圖
  v1.style.display = S.step === 1 ? 'block' : 'none';
  v2.style.display = S.step === 2 ? 'block' : 'none';
  v3.style.display = S.step === 3 ? 'block' : 'none';

  if (S.step === 1) {
    v1.innerHTML = `
      <div class="card">
        <div class="card-head">📸 上傳騎乘側面照片</div>
        <div class="card-body">
          <div class="upload-grid">
            <div class="upload-slot" onclick="document.getElementById('fi-bdc').click()">
              ${S.bdcURL ? `<img src="${S.bdcURL}" class="slot-preview">` : '🦵 上傳 BDC (6點鐘)'}
              <input type="file" id="fi-bdc" hidden onchange="handleFile('bdc', this)">
            </div>
            <div class="upload-slot" onclick="document.getElementById('fi-tdc').click()">
              ${S.tdcURL ? `<img src="${S.tdcURL}" class="slot-preview">` : '🔄 上傳 TDC (1點鐘)'}
              <input type="file" id="fi-tdc" hidden onchange="handleFile('tdc', this)">
            </div>
          </div>
          <button class="analyze-btn ${S.bdcURL && S.tdcURL ? '' : 'disabled'}" onclick="startAnalysis()">開始 AI 視覺分析</button>
        </div>
      </div>
    `;
  }

  if (S.step === 2) {
    v2.innerHTML = `<div class="card"><div class="card-body" style="text-align:center;">🚀 Gemini 正在分析中... 請稍候</div></div>`;
  }

  if (S.step === 3 && S.result) {
    v3.innerHTML = `
      <div class="card">
        <div class="card-head">✅ 分析完成</div>
        <div class="card-body">
          <pre style="background:#f4f4f4; padding:15px; border-radius:8px; overflow:auto;">${JSON.stringify(S.result, null, 2)}</pre>
          <button class="analyze-btn" style="margin-top:20px" onclick="location.reload()">重新開始</button>
        </div>
      </div>
    `;
  }
}

// ── 事件處理 ──────────────────────────────────────────
function handleFile(key, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    S[key + 'URL'] = e.target.result;
    render();
  };
  reader.readAsDataURL(file);
}

async function startAnalysis() {
  if (!S.bdcURL || !S.tdcURL) return;
  S.step = 2;
  render();

  try {
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{
          role: 'user',
          content: [
            { type: 'text', text: "分析這兩張 BikeFit 照片，請以 JSON 格式回傳角度數據。" },
            { type: 'image', source: { type: 'base64', data: S.bdcURL.split(',')[1] } }
          ]
        }]
      })
    });
    const data = await resp.json();
    S.result = data;
    S.step = 3;
  } catch (err) {
    alert("分析失敗：" + err.message);
    S.step = 1;
  }
  render();
}

// ── 關鍵：啟動點 ──────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  console.log("Orange Fruit 初始化...");
  render();
});
</script>

</body>
</html>
