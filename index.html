<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange Fruit — AI BikeFit Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   TOKENS & BASE
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --or: #F47B00; --ord: #C96200; --orl: #FFF8F0; --orb: #F5C060;
  --dk: #0F0F0F; --dk2: #1A1A1A; --dk3: #252525;
  --bg: #F7F6F4; --sur: #FFFFFF; --sur2: #F9F9F8; --sur3: #F2F1EF;
  --bd: #E8E8E6; --bd2: #D8D8D5; --bd3: #C8C8C4;
  --tx: #0F0F0F; --tx2: #3A3A3A; --tx3: #7A7A78; --tx4: #ADADAA;
  --ok: #0B8A5C; --ok-bg: #E8F6EF; --ok-bd: #9ADFC0;
  --wn: #B86A00; --wn-bg: #FEF3E2; --wn-bd: #F5C87A;
  --er: #C0231A; --er-bg: #FDECEB; --er-bd: #F5ACA8;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'DM Mono', 'Courier New', monospace;
  --r: 16px; --rs: 10px; --rl: 20px;
  --sh: 0 1px 3px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.06);
  --sh2: 0 8px 32px rgba(0,0,0,.12);
}

html { font-size: 16px; scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--tx); min-height: 100vh; -webkit-font-smoothing: antialiased; line-height: 1.5; }
input[type=range] { accent-color: var(--or); width: 100%; cursor: pointer; }
input[type=file] { display: none; }

/* ═══════════════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════════════ */
@keyframes spin    { to { transform: rotate(360deg); } }
@keyframes fadeUp  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
@keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
@keyframes progBar { 0%{background-position:0 0} 100%{background-position:48px 0} }
@keyframes glow    { 0%,100%{box-shadow:0 4px 18px rgba(244,123,0,.45)} 50%{box-shadow:0 4px 28px rgba(244,123,0,.7)} }

.fade-up { animation: fadeUp .35s cubic-bezier(.22,1,.36,1) both; }
.fade-in { animation: fadeIn .25s ease both; }

/* ═══════════════════════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════════════════════ */
.navbar { background: var(--dk); height: 66px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,.06); }
.nav-brand { display: flex; align-items: center; gap: 14px; }
.nav-name { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.03em; }
.nav-name span { color: var(--or); }
.nav-tagline { font-size: 9px; color: rgba(244,123,0,.7); letter-spacing: .2em; text-transform: uppercase; font-weight: 500; }
.nav-badge { font-family: var(--mono); font-size: 10px; padding: 4px 12px; border-radius: 20px; background: rgba(244,123,0,0.12); color: var(--or); border: 1px solid rgba(244,123,0,0.35); }

/* ═══════════════════════════════════════════════════════════
   LAYOUT & CARDS (省略部分重複樣式以節省空間，保持原有設計)
═══════════════════════════════════════════════════════════ */
.page { max-width: 1020px; margin: 0 auto; padding: 32px 20px 80px; }
.step-bar { display: flex; align-items: center; background: var(--sur); border: 1px solid var(--bd); border-radius: var(--r); padding: 16px 24px; margin-bottom: 24px; box-shadow: var(--sh); overflow-x: auto; }
.step-item { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.step-circle { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; transition: all .35s; }
.step-circle.done { background: var(--or); color: #fff; }
.step-circle.active { background: var(--dk); color: #fff; }
.step-circle.idle { background: var(--bd); color: var(--tx4); }
.step-connector { flex: 1; min-width: 32px; height: 2px; background: var(--bd); margin: 0 10px; border-radius: 1px; }
.step-connector.done { background: var(--or); }

.card { background: var(--sur); border: 1px solid var(--bd); border-radius: var(--rl); overflow: hidden; margin-bottom: 20px; box-shadow: var(--sh); }
.card-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; border-bottom: 1px solid var(--bd); }
.card-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.card-body { padding: 22px; }

/* ═══════════════════════════════════════════════════════════
   UI COMPONENTS
═══════════════════════════════════════════════════════════ */
.upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }
.upload-slot { border: 2px dashed var(--bd2); border-radius: var(--r); overflow: hidden; cursor: pointer; transition: all .22s; background: var(--sur2); min-height: 220px; display: flex; flex-direction: column; position: relative; }
.upload-slot.filled { border-style: solid; border-color: var(--or); background: var(--sur); }
.slot-preview { width: 100%; height: 220px; object-fit: cover; display: block; }
.slot-remove { position: absolute; top: 44px; right: 10px; width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,.65); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }

.analyze-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--or); color: #fff; font-size: 16px; font-weight: 800; padding: 15px 34px; border-radius: 12px; border: none; cursor: pointer; transition: all .22s; animation: glow 3s infinite; }
.analyze-btn.disabled { background: #3A3A3A; color: rgba(255,255,255,0.3); cursor: not-allowed; animation: none; }

.progress-card { background: var(--sur); border: 1px solid var(--bd); border-radius: var(--rl); padding: 24px; box-shadow: var(--sh); margin-bottom: 20px; }
.progress-bar-bg { height: 6px; background: var(--bd); border-radius: 3px; overflow: hidden; margin-bottom: 14px; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--or), #FFB347, var(--or)); background-size: 48px 100%; animation: progBar 1s linear infinite; transition: width .5s; }
.progress-log { font-family: var(--mono); font-size: 11px; line-height: 2; max-height: 130px; overflow-y: auto; }
.log-ok { color: var(--ok); } .log-info { color: var(--or); } .log-err { color: var(--er); }

/* ═══════════════════════════════════════════════════════════
   REPORT & TABS
═══════════════════════════════════════════════════════════ */
.tab-bar { display: flex; border-bottom: 2px solid var(--bd); padding: 0 22px; background: var(--sur); overflow-x: auto; }
.tab-btn { font-family: var(--font); font-size: 13px; font-weight: 600; padding: 13px 18px; border: none; border-bottom: 2.5px solid transparent; cursor: pointer; background: transparent; color: var(--tx3); }
.tab-btn.on { color: var(--or); border-bottom-color: var(--or); }
.tab-panel { display: none; padding: 22px; }
.tab-panel.on { display: block; }

.footer { background: var(--dk); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; margin-top: 40px; }
.footer-l { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.25); }
.footer-r { font-size: 13px; font-weight: 700; color: var(--or); }

@media (max-width: 660px) { .upload-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-wordmark">
      <div class="nav-name"><span>Orange</span> Fruit</div>
      <div class="nav-tagline">Free Your Fit</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-badge">GEMINI 1.5 FLASH AI</div>
  </div>
</nav>

<div class="page" id="page">
  <div class="step-bar" id="step-bar"></div>
  <div class="error-box" id="error-box" style="display:none; background:var(--er-bg); color:var(--er); padding:12px; border-radius:8px; margin-bottom:18px;"></div>
  
  <div id="view-1"></div>
  <div id="view-2" style="display:none"></div>
  <div id="view-3" style="display:none"></div>
</div>

<footer class="footer">
  <div class="footer-l">Orange Fruit AI BikeFit Analyzer · v3.1 · Gemini Engine · OPC Protocol</div>
  <div class="footer-r">Powered by Google Gemini AI</div>
</footer>

<script>
/* ── CONSTANTS & STATE ── */
const TG = {
  knee_extension:  { min:25, max:35,  lbl:'膝伸展 BDC' },
  knee_flexion:    { min:90, max:110, lbl:'膝屈曲 TDC' },
  hip_angle:       { min:55, max:75,  lbl:'髖關節閉合' },
  ankle_max:       { min:90, max:115, lbl:'腳踝背屈'   },
  shoulder_wrist:  { min:75, max:95,  lbl:'肩→腕角'   },
  back_angle:      { min:35, max:50,  lbl:'背部角度'   },
};
const C = { ok: '#0B8A5C', wk: '#B86A00', er: '#C0231A', na: '#ADADAA' };
const LL = { ok:'✓ 達標', wk:'△ 偏差', er:'✕ 超出', na:'—' };

let S = {
  step: 1, bdcURL: null, bdcImg: null, tdcURL: null, tdcImg: null,
  result: null, error: '', tab: 'angles', pct: 0, logs: [],
  sim: { sh:0, sb:0, st:0, sl:0 }
};

function set(p) { Object.assign(S, p); render(); }

/* ── RENDER ENGINE ── */
function render() {
  renderStepBar();
  document.getElementById('view-1').style.display = S.step === 1 ? '' : 'none';
  document.getElementById('view-2').style.display = S.step === 2 ? '' : 'none';
  document.getElementById('view-3').style.display = S.step === 3 ? '' : 'none';
  if (S.step === 1) renderUpload();
  if (S.step === 2) renderProgress();
  if (S.step === 3) renderReport();
}

function renderStepBar() {
  const steps = [{ n:1, l:'上傳照片' }, { n:2, l:'Gemini 分析' }, { n:3, l:'報告結果' }];
  document.getElementById('step-bar').innerHTML = steps.map((s, i) => {
    const cs = S.step > s.n ? 'done' : S.step === s.n ? 'active' : 'idle';
    const conn = i < steps.length - 1 ? `<div class="step-connector${S.step > s.n ? ' done' : ''}"></div>` : '';
    return `<div class="step-item"><div class="step-circle ${cs}">${S.step > s.n ? '✓' : s.n}</div><div class="step-label">${s.l}</div></div>${conn}`;
  }).join('');
}

/* ── VIEW 1: UPLOAD ── */
function renderUpload() {
  const el = document.getElementById('view-1');
  const has2 = S.bdcURL && S.tdcURL;
  el.innerHTML = `
    <div class="card fade-up">
      <div class="card-head"><div class="card-title">📸 上傳騎乘側面照片</div></div>
      <div class="card-body">
        <div class="upload-grid">
          ${renderSlot('bdc', 'BDC (6點鐘)', '🦵')}
          ${renderSlot('tdc', 'TDC (1點鐘)', '🔄')}
        </div>
        <div class="analyze-btn ${has2 ? '' : 'disabled'}" id="analyze-btn">開始 Gemini 視覺分析 →</div>
      </div>
    </div>`;
  bindUploadEvents();
}

function renderSlot(key, label, icon) {
  const url = S[key + 'URL'];
  return `<div class="upload-slot ${url ? 'filled' : ''}" onclick="document.getElementById('fi-${key}').click()">
    <div style="padding:10px; font-size:12px; font-weight:600;">${label}</div>
    ${url ? `<img src="${url}" class="slot-preview">` : `<div style="text-align:center; padding:40px;">${icon}<br>點擊上傳</div>`}
    <input type="file" id="fi-${key}" onchange="handleFile('${key}', this.files[0])">
  </div>`;
}

function handleFile(key, file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { S[key+'Img'] = img; set({ [key+'URL']: e.target.result }); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function bindUploadEvents() {
  const btn = document.getElementById('analyze-btn');
  if (btn && S.bdcURL && S.tdcURL) btn.onclick = startAnalysis;
}

/* ── VIEW 2: PROGRESS ── */
function renderProgress() {
  document.getElementById('view-2').innerHTML = `
    <div class="progress-card fade-in">
      <div class="progress-header"><div class="spinner"></div><div class="progress-title">Google Gemini 正在分析您的姿勢...</div></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${S.pct}%"></div></div>
      <div class="progress-log">${S.logs.map(l => `<div class="log-${l.c}">${l.m}</div>`).join('')}</div>
    </div>`;
}

/* ── ANALYSIS CORE ── */
async function startAnalysis() {
  set({ step: 2, pct: 10, logs: [{ m: '▶ 啟動 Gemini 視覺引擎...', c: 'info' }] });
  
  try {
    const content = [];
    if (S.bdcURL) content.push({ type: 'image', source: { type: 'base64', data: S.bdcURL.split(',')[1] } });
    if (S.tdcURL) content.push({ type: 'image', source: { type: 'base64', data: S.tdcURL.split(',')[1] } });
    content.push({ type: 'text', text: buildPrompt() });

    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content }] })
    });

    if (!resp.ok) throw new Error('API 傳回錯誤，請檢查 Vercel 設定');
    const data = await resp.json();
    const raw = data.content[0].text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(raw);

    set({ result: parsed, step: 3, pct: 100 });
  } catch (err) {
    set({ step: 1, error: err.message });
  }
}

function buildPrompt() {
  return `你是專業 Bikefit 分析師。請分析圖片並回傳 JSON。
  {"angles":{"knee_extension":0,"knee_flexion":0,"hip_angle":0,"ankle_max":0,"shoulder_wrist":0,"back_angle":0},
   "skeleton":{"hip":{"x":0,"y":0},"knee":{"x":0,"y":0},"ankle":{"x":0,"y":0},"shoulder":{"x":0,"y":0},"elbow":{"x":0,"y":0},"wrist":{"x":0,"y":0}},
   "overall":"good","confidence":90,"summary_zh":"摘要內容"}`;
}

/* ── VIEW 3: REPORT ── */
function renderReport() {
  const r = S.result;
  document.getElementById('view-3').innerHTML = `
    <div class="card fade-up">
      <div class="card-head"><div class="report-title">BikeFit 分析報告 (Gemini)</div></div>
      <div class="tab-bar">
        <button class="tab-btn on">📐 角度數據</button>
      </div>
      <div class="card-body">
        <div style="font-size:14px; color:var(--tx2); margin-bottom:20px;">${r.summary_zh}</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          ${Object.entries(r.angles).map(([k, v]) => `<div style="background:var(--sur2); padding:10px; border-radius:8px;">
            <div style="font-size:10px; color:var(--tx4);">${TG[k]?.lbl || k}</div>
            <div style="font-size:20px; font-weight:800; color:var(--or);">${v}°</div>
          </div>`).join('')}
        </div>
        <button class="btn-orange" style="width:100%; margin
