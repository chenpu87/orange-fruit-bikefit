<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange Fruit — AI BikeFit Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght=0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght=400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   TOKENS & BASE
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --or: #F47B00; --ord: #C96200; --orl: #FFF8F0; --orb: #F5C060;
  --dk: #0F0F0F; --dk2: #1A1A1A; --dk3: #252525;
  --bg: #F7F6F4; --sur: #FFFFFF; --sur2: #F9F9F8; --sur3: #F2F1EF;
  --bd: #E8E8E6; --bd2: #D8D8D5; --bd3: #C8C8C4;
  --tx: #0F0F0F; --tx2: #3A3A3A; --tx3: #7A7A78; --tx4: #ADADAA;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'DM Mono', 'Courier New', monospace;
  --r: 16px; --rl: 20px;
  --sh: 0 1px 3px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.06);
}

body { font-family: var(--font); background: var(--bg); color: var(--tx); min-height: 100vh; line-height: 1.5; }

/* ═══════════════════════════════════════════════════════════
   NAVBAR (包含 LOGO)
═══════════════════════════════════════════════════════════ */
.navbar { background: var(--dk); height: 66px; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.06); }
.nav-left { display: flex; align-items: center; gap: 10px; }
.nav-name { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.03em; }
.nav-name span { color: var(--or); }
.nav-badge { font-family: var(--mono); font-size: 10px; padding: 4px 12px; border-radius: 20px; background: rgba(244,123,0,0.12); color: var(--or); border: 1px solid rgba(244,123,0,0.35); }

/* 右上方 Logo 樣式 */
.nav-logo-link { display: flex; align-items: center; text-decoration: none; }
.nav-logo-img { height: 40px; width: 40px; border-radius: 8px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.2s; }
.nav-logo-link:hover .nav-logo-img { transform: scale(1.05); }

/* ═══════════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════════ */
.page { max-width: 1020px; margin: 0 auto; padding: 32px 20px 80px; }
.step-bar { display: flex; align-items: center; background: var(--sur); border: 1px solid var(--bd); border-radius: var(--r); padding: 16px 24px; margin-bottom: 24px; box-shadow: var(--sh); overflow-x: auto; }
.step-item { display: flex; align-items: center; gap: 8px; flex-shrink: 0; font-size: 13px; font-weight: 600; }
.step-circle { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; transition: all 0.3s; }
.step-circle.active { background: var(--dk); color: #fff; }
.step-circle.idle { background: var(--bd); color: var(--tx4); }
.step-connector { flex: 1; min-width: 20px; height: 2px; background: var(--bd); margin: 0 10px; border-radius: 1px; }

/* ═══════════════════════════════════════════════════════════
   CARDS & UI
═══════════════════════════════════════════════════════════ */
.card { background: var(--sur); border: 1px solid var(--bd); border-radius: var(--rl); overflow: hidden; margin-bottom: 20px; box-shadow: var(--sh); animation: fadeUp 0.35s ease-out; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

.card-head { padding: 16px 22px; border-bottom: 1px solid var(--bd); font-weight: 700; font-size: 15px; }
.card-body { padding: 22px; }

.upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }
.upload-slot { border: 2px dashed var(--bd2); border-radius: var(--r); overflow: hidden; cursor: pointer; background: var(--sur2); min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: all 0.2s; gap: 10px; padding: 20px; text-align: center; }
.upload-slot:hover { border-color: var(--or); background: var(--orl); }
.upload-slot.filled { border-style: solid; border-color: var(--or); background: var(--sur); cursor: default; padding: 0; }
.slot-preview { width: 100%; height: 220px; object-fit: cover; display: block; }
.slot-icon { font-size: 32px; opacity: 0.3; }
.slot-text { font-size: 12px; color: var(--tx3); font-family: var(--mono); }
.slot-remove { position: absolute; top: 10px; right: 10px; width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; font-family: var(--font); font-size: 12px; transition: background 0.2s; }
.slot-remove:hover { background: rgba(192,35,26,0.8); }

.analyze-btn { width: 100%; background: var(--or); color: #fff; font-size: 16px; font-weight: 800; padding: 15px; border-radius: 12px; border: none; cursor: pointer; transition: background 0.2s, transform 0.1s; }
.analyze-btn:hover:not(.disabled) { background: var(--ord); transform: translateY(-1px); }
.analyze-btn:active:not(.disabled) { transform: translateY(0px); }
.analyze-btn.disabled { background: #ccc; cursor: not-allowed; opacity: 0.7; }

.footer { background: var(--dk); padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; color: rgba(255,255,255,0.4); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.06); }

@media (max-width: 600px) { 
  .navbar { padding: 0 16px; }
  .upload-grid { grid-template-columns: 1fr; } 
  .footer { flex-direction: column; gap: 8px; text-align: center; }
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <div class="nav-name"><span>Orange</span> Fruit</div>
    <div class="nav-badge">GEMINI AI Fit</div>
  </div>
  <a href="#" class="nav-logo-link" title="Orange Fruit Home">
    <img src="image_c26c34.png" alt="Orange Fruit Logo" class="nav-logo-img">
  </a>
</nav>

<div class="page" id="page">
  <div class="step-bar" id="step-bar"></div>
  <div id="view-1"></div>
  <div id="view-2" style="display:none"></div>
  <div id="view-3" style="display:none"></div>
</div>

<footer class="footer">
  <div>Orange Fruit AI BikeFit · v3.3</div>
  <div style="color:var(--or); font-weight: 600;">Powered by Google Gemini AI</div>
</footer>

<script>
// ── 狀態管理 ──────────────────────────────────────────
let S = {
  step: 1,
  bdcURL: null,
  tdcURL: null,
  result: null,
  error: ''
};

// ── 核心渲染函式 ──────────────────────────────────────
function render() {
  const stepBar = document.getElementById('step-bar');
  const v1 = document.getElementById('view-1');
  const v2 = document.getElementById('view-2');
  const v3 = document.getElementById('view-3');

  // 安全檢查，防止找不到容器報錯
  if (!stepBar || !v1 || !v2 || !v3) {
    console.error("找不到必要的 HTML 容器，無法渲染。");
    return;
  }

  // 1. 更新步驟條內容
  stepBar.innerHTML = `
    <div class="step-item"><div class="step-circle ${S.step>=1?'active':'idle'}">1</div> 上傳照片</div>
    <div class="step-connector"></div>
    <div class="step-item"><div class="step-circle ${S.step>=2?'active':'idle'}">2</div> AI 分析</div>
    <div class="step-connector"></div>
    <div class="step-item"><div class="step-circle ${S.step>=3?'active':'idle'}">3</div> 查看報告</div>
  `;

  // 2. 控制 View 的顯示與隱藏
  v1.style.display = S.step === 1 ? 'block' : 'none';
  v2.style.display = S.step === 2 ? 'block' : 'none';
  v3.style.display = S.step === 3 ? 'block' : 'none';

  // 3. 渲染 View 1: 上傳頁面
  if (S.step === 1) {
    v1.innerHTML = `
      <div class="card">
        <div class="card-head">📸 上傳騎乘側面照片</div>
        <div class="card-body">
          <div class="upload-grid">
            ${renderSlot('bdc', '下死點 (BDC)', '🦵')}
            ${renderSlot('tdc', '上死點 (TDC)', '🔄')}
          </div>
          <button class="analyze-btn ${S.bdcURL && S.tdcURL ? '' : 'disabled'}" onclick="startAnalysis()" ${S.bdcURL && S.tdcURL ? '' : 'disabled'}>開始 Gemini 視覺分析 →</button>
          ${S.error ? `<div style="color:var(--er); font-size:13px; margin-top:10px; text-align:center;">⚠ ${S.error}</div>` : ''}
        </div>
      </div>
    `;
  }

  // 4. 渲染 View 2: 分析中頁面
  if (S.step === 2) {
    v2.innerHTML = `
      <div class="card" style="text-align:center; padding: 40px 20px;">
        <div style="font-size: 40px; margin-bottom: 20px; animation: pulse 1.5s infinite;">🚀</div>
        <div style="font-weight:700; color:var(--or);">Google Gemini AI 正在分析中...</div>
        <div style="font-size:12px; color:var(--tx3); margin-top:10px; font-family:var(--mono);">這通常需要 10-15 秒</div>
      </div>
    `;
  }

  // 5. 渲染 View 3: 報告頁面
  if (S.step === 3 && S.result) {
    v3.innerHTML = `
      <div class="card">
        <div class="card-head">✅ BikeFit 分析簡報</div>
        <div class="card-body">
          <div style="background:var(--sur2); padding:15px; border-radius:8px; margin-bottom:15px;">
            <div style="font-size:11px; color:var(--tx3); font-family:var(--mono); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:5px;">AI 摘要</div>
            <div style="font-size:14px; color:var(--tx2); line-height:1.7;">${S.result.summary_zh || 'Gemini 已完成您的姿勢分析。'}</div>
          </div>
          <pre style="background:var(--dk); color:#a7f3d0; padding:15px; border-radius:8px; overflow:auto; font-family:var(--mono); font-size:12px; max-height:300px;">${JSON.stringify(S.result.angles, null, 2)}</pre>
          <button class="analyze-btn" style="margin-top:20px; background:var(--dk);" onclick="location.reload()">↺ 分析新照片</button>
        </div>
      </div>
    `;
  }
}

// ── 輔助渲染函式 ──────────────────────────────────────
function renderSlot(key, label, icon) {
  const url = S[key + 'URL'];
  if (url) {
    return `
      <div class="upload-slot filled">
        <img src="${url}" class="slot-preview">
        <button class="slot-remove" onclick="removeImage('${key}', event)">✕</button>
      </div>
    `;
  } else {
    return `
      <div class="upload-slot" onclick="document.getElementById('fi-${key}').click()">
        <div class="slot-icon">${icon}</div>
        <div style="font-weight:700; font-size:14px;">上傳 ${label}</div>
        <div class="slot-text">點擊選取圖片</div>
        <input type="file" id="fi-${key}" hidden accept="image/*" onchange="handleFile('${key}', this)">
      </div>
    `;
  }
}

// ── 事件處理 ──────────────────────────────────────────
function handleFile(key, input) {
  const file = input.files[0];
  if (!file) return;
  
  if (!file.type.startsWith('image/')) {
    alert('請上傳圖片檔案 (JPG, PNG等)');
    input.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    S[key + 'URL'] = e.target.result;
    S.error = '';
    render();
  };
  reader.readAsDataURL(file);
}

function removeImage(key, event) {
  event.stopPropagation(); // 防止觸發父層的 onclick
  S[key + 'URL'] = null;
  // 清空 file input 的值，確保可以重複選擇同一張圖
  const input = document.getElementById('fi-' + key);
  if (input) input.value = '';
  render();
}

async function startAnalysis() {
  if (!S.bdcURL || !S.tdcURL) return;
  
  S.step = 2;
  S.error = '';
  render();

  try {
    const content = [];
    if (S.bdcURL) content.push({ type: 'image', source: { type: 'base64', data: S.bdcURL.split(',')[1] } });
    if (S.tdcURL) content.push({ type: 'image', source: { type: 'base64', data: S.tdcURL.split(',')[1] } });
    content.push({ type: 'text', text: buildPrompt() });

    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content }] })
    });

    if (!resp.ok) throw new Error(`API 伺服器傳回錯誤 (HTTP ${resp.status})`);
    
    const data = await resp.json();
    
    // 從適配器結構中提取 Gemini 的回傳文字
    const rawText = data.content[0].text;
    
    // 清理 Gemini 有時會自動帶有的 ```json 標籤
    const cleanJSON = rawText.replace(/```json|```/g, '').trim();
    
    // 解析 JSON
    S.result = JSON.parse(cleanJSON);
    S.step = 3;
    
  } catch (err) {
    console.error(err);
    S.error = '分析失敗，可能是圖片解析錯誤或 Key 額度耗盡：' + err.message;
    S.step = 1;
  }
  render();
}

function buildPrompt() {
  return `你是專業 Bikefit 分析師。請分析圖片並回傳嚴格格式的 JSON。不要包含 markdown 標籤。
  {"angles":{"knee_extension":0,"knee_flexion":0,"hip_angle":0,"ankle_max":0,"shoulder_wrist":0,"back_angle":0},
   "overall":"good","confidence":90,"summary_zh":"3-4句繁體中文摘要調整建議"}`;
}

// ── 關鍵：在 DOM 載入後啟動 ──────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  console.log("Orange Fruit 初始化完成，準備渲染...");
  render();
});

// Pulse 動畫
const styleSheet = document.styleSheets[0];
styleSheet.insertRule('@keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }', styleSheet.cssRules.length);
</script>

</body>
</html>
