<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange Fruit — Smart BikeFit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#F47B00;--ord:#C96200;--orl:#FFF3E0;--orb:#F5C060;
  --dk:#111;--dk2:#1E1E1E;
  --bg:#F7F6F4;--sur:#FFF;--sur2:#F9F9F8;
  --bd:#E8E8E6;--bd2:#D8D8D5;
  --tx:#111;--tx2:#484848;--tx3:#888;--tx4:#C0C0C0;
  --ok:#0B8A5C;--ok-bg:#E8F6EF;--ok-bd:#9ADFC0;
  --wn:#B86A00;--wn-bg:#FEF3E2;--wn-bd:#F5C87A;
  --er:#C0231A;--er-bg:#FDECEB;--er-bd:#F5ACA8;
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'DM Mono','Courier New',monospace;
  --r:16px;--rs:10px;
  --sh:0 1px 4px rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.06);
}
html,body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
input[type=range]{accent-color:var(--or);width:100%;cursor:pointer}
input[type=file]{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes glow{0%,100%{box-shadow:0 4px 18px rgba(244,123,0,.45)}50%{box-shadow:0 4px 28px rgba(244,123,0,.7)}}
.fade{animation:fadeUp .3s ease}

/* NAV */
.nav{background:var(--dk);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:13px}
.nav-name{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.1}
.nav-name span{color:var(--or)}
.nav-tag{font-size:9px;color:var(--or);letter-spacing:.18em;text-transform:uppercase;font-weight:600;margin-top:2px}
.nav-chip{font-family:var(--mono);font-size:10px;padding:4px 12px;border-radius:20px;background:rgba(244,123,0,.15);color:var(--or);border:.5px solid rgba(244,123,0,.4);letter-spacing:.07em;font-weight:600}

/* PAGE */
.page{max-width:980px;margin:0 auto;padding:28px 18px 80px}

/* STEPBAR */
.stepbar{display:flex;align-items:center;background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:14px 20px;margin-bottom:22px;box-shadow:var(--sh);overflow-x:auto;gap:0}
.step-item{display:flex;align-items:center;gap:7px;flex-shrink:0}
.step-n{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .3s}
.step-n.done{background:var(--or);color:#fff}
.step-n.active{background:var(--dk);color:#fff}
.step-n.idle{background:var(--bd);color:var(--tx3)}
.step-l{font-size:12px;font-weight:600;white-space:nowrap}
.step-l.active{color:var(--tx)}.step-l.idle{color:var(--tx3)}
.step-line{flex:1;min-width:24px;height:2px;background:var(--bd);margin:0 8px;border-radius:1px;transition:background .3s}
.step-line.done{background:var(--or)}

/* CARD */
.card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:18px;box-shadow:var(--sh)}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-body{padding:20px}

/* INSTR */
.instr{background:linear-gradient(135deg,var(--orl),#FFE8C5);border:1px solid var(--orb);border-radius:var(--rs);padding:14px 16px;margin-bottom:18px}
.instr-title{font-size:12px;font-weight:700;color:#8A4200;margin-bottom:9px}
.instr-steps{display:flex;flex-direction:column;gap:6px}
.instr-step{display:flex;align-items:flex-start;gap:9px;font-size:12px;color:#6A3200;line-height:1.55}
.instr-num{width:20px;height:20px;border-radius:50%;background:var(--or);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* UPLOAD */
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.uslot{border:2px dashed var(--bd2);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s;background:var(--sur2);min-height:210px;display:flex;flex-direction:column;position:relative}
.uslot:hover,.uslot.drag{border-color:var(--or);background:var(--orl)}
.uslot.filled{border-style:solid;border-color:var(--or);cursor:default;background:var(--sur)}
.uslot-head{padding:9px 13px;display:flex;align-items:center;gap:7px;border-bottom:1px solid transparent}
.uslot-head.bdc{background:#FFF0DC;border-color:#F5D080}
.uslot-head.tdc{background:#E8F4FF;border-color:#B5D4F4}
.ubadge{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 8px;border-radius:10px;letter-spacing:.1em}
.ubadge.bdc{background:var(--or);color:#fff}
.ubadge.tdc{background:#185FA5;color:#fff}
.uname{font-size:12px;font-weight:600;color:#3A3A3A}
.uempty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:8px;text-align:center}
.uicon{font-size:30px;opacity:.35}
.udesc{font-size:11px;color:var(--tx3);font-family:var(--mono);line-height:1.6}
.uhint{font-size:11px;color:var(--or);font-weight:600}
.uprv{width:100%;height:210px;object-fit:cover;display:block}
.urm{position:absolute;top:40px;right:8px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:10}
.urm:hover{background:rgba(192,35,26,.85)}

/* BUTTONS */
button{font-family:var(--font);font-size:13px;font-weight:600;padding:9px 18px;border-radius:var(--rs);border:1px solid var(--bd2);cursor:pointer;background:var(--sur);color:var(--tx);transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
button:hover{background:var(--sur2)}
button:active{transform:scale(.97)}
button:disabled{opacity:.38;cursor:not-allowed;transform:none!important}
.btn-dark{background:var(--dk);color:#fff;border-color:transparent}
.btn-dark:hover{background:var(--dk2)}
.btn-ghost{color:var(--tx3);border-color:var(--bd);background:transparent}
.btn-ghost:hover{color:var(--tx);background:var(--sur2)}
.btn-orange{background:var(--or);color:#fff;border-color:transparent}
.btn-orange:hover{background:var(--ord)}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px}
.btn-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* CTA */
.cta{background:linear-gradient(135deg,#141414,#222);border-radius:var(--r);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;border:1px solid rgba(255,255,255,.06)}
.cta-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:3px;letter-spacing:-.01em}
.cta-sub{font-size:11px;color:rgba(255,255,255,.35);font-family:var(--mono)}
.btn-analyze{background:var(--or);color:#fff;border:none;font-size:15px;font-weight:800;padding:14px 30px;border-radius:11px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;box-shadow:0 4px 18px rgba(244,123,0,.5);letter-spacing:.01em;font-family:var(--font);animation:glow 3s ease-in-out infinite}
.btn-analyze:hover{background:var(--ord);transform:translateY(-2px);box-shadow:0 6px 26px rgba(244,123,0,.65);animation:none}
.btn-analyze:active{transform:translateY(0)}
.btn-analyze:disabled{background:#3A3A3A;color:rgba(255,255,255,.3);box-shadow:none;transform:none;cursor:not-allowed;animation:none}
.btn-analyze .arr{font-size:18px;transition:transform .2s}
.btn-analyze:not(:disabled):hover .arr{transform:translateX(4px)}

/* JOINT MARKING */
.joint-wrap{position:relative;background:#000;cursor:crosshair;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.joint-wrap.done-marking{cursor:default}
#joint-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#joint-img{width:100%;display:block;max-height:520px;object-fit:contain}
.joint-status{padding:13px 18px;background:var(--sur2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.joint-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.joint-tag-row{padding:10px 18px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--bd)}
.jtag{display:flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border-radius:20px;transition:all .2s}

/* PROGRESS */
.prog-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.prog-head{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700;color:var(--or);margin-bottom:14px}
.spinner{width:16px;height:16px;border:2.5px solid rgba(244,123,0,.2);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.pbg{height:5px;background:var(--bd);border-radius:3px;overflow:hidden;margin-bottom:12px}
.pbf{height:100%;background:linear-gradient(90deg,var(--or),#FFB347);border-radius:3px;transition:width .5s ease}
.plog{font-family:var(--mono);font-size:11px;line-height:2;max-height:110px;overflow-y:auto}
.log-ok{color:var(--ok)}.log-info{color:var(--or)}.log-mute{color:var(--tx3)}.log-err{color:var(--er)}

/* ERROR */
.err-box{background:var(--er-bg);border:1px solid var(--er-bd);border-radius:var(--rs);padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--er);margin-bottom:16px;display:none}

/* REPORT */
.rpt-head{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.rpt-title{font-size:18px;font-weight:800;letter-spacing:-.025em}
.rpt-meta{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-top:3px}
.opill{font-family:var(--mono);font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;letter-spacing:.06em}
.tabs{display:flex;border-bottom:2px solid var(--bd);padding:0 20px;background:var(--sur);overflow-x:auto;gap:2px}
.tab-btn{font-family:var(--font);font-size:12px;font-weight:600;padding:12px 16px;border:none;border-bottom:2.5px solid transparent;cursor:pointer;background:transparent;color:var(--tx3);margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.tab-btn:hover{color:var(--or)}.tab-btn.on{color:var(--or);border-bottom-color:var(--or)}
.tpanel{display:none;padding:20px}.tpanel.on{display:block}

/* ANGLE CARDS */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.acard{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:14px;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s}
.acard:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
.acard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--ac)}
.a-lbl{font-family:var(--mono);font-size:9px;color:var(--tx4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.a-val{font-size:32px;font-weight:800;color:var(--ac);line-height:1;letter-spacing:-.04em;margin-bottom:3px}
.a-tgt{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-bottom:5px}
.a-st{font-size:11px;font-weight:600;color:var(--ac)}
.a-bar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:8px}
.a-barf{height:100%;background:var(--ac);border-radius:2px;transition:width 1.4s ease}

/* SUMMARY */
.sum-card{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px}
.sum-lbl{font-family:var(--mono);font-size:9px;color:var(--tx4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}
.sum-txt{font-size:13px;line-height:1.85;color:var(--tx2)}

/* SKELETON */
.sk-wrap{background:#0C0E13;border-radius:var(--r);overflow:hidden;margin-bottom:12px;border:1px solid #1E2230}
.sk-bar{background:#111420;padding:10px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.06)}
.sk-bar span{font-family:var(--mono);font-size:10px;color:#505878}
.sk-bar .sk-tag{color:var(--or);font-weight:600}
#sk-canvas{width:100%;display:block}
.sk-legend{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:11px 14px;display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx3)}

/* RECS */
.rec-list{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.rec-item{display:flex;gap:13px;padding:14px 18px;border-bottom:1px solid var(--bd);transition:background .15s}
.rec-item:last-child{border-bottom:none}
.rec-item:hover{background:var(--sur2)}
.rec-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.rec-title{font-size:13px;font-weight:700;margin-bottom:3px}
.rec-desc{font-size:12px;color:var(--tx2);line-height:1.65}
.rec-action{display:inline-block;margin-top:7px;font-family:var(--mono);font-size:10px;color:#8A4200;background:var(--orl);padding:3px 10px;border-radius:5px;border:1px solid var(--orb);font-weight:600}

/* ACTIONS */
.rpt-actions{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--bd);background:var(--sur2);flex-wrap:wrap}

/* FOOTER */
.footer{background:var(--dk);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.footer-l{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.25)}
.footer-r{font-size:13px;font-weight:700;color:var(--or)}

@media(max-width:620px){
  .upload-grid{grid-template-columns:1fr}
  .cta{flex-direction:column}
  .btn-analyze{width:100%;justify-content:center}
  .nav{padding:0 14px}
  .page{padding:16px 12px 60px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <svg width="40" height="35" viewBox="0 0 40 35" fill="none">
      <rect width="25" height="25" rx="3" fill="#F47B00"/>
      <circle cx="12.5" cy="12.5" r="7.5" fill="white"/>
      <rect y="27" width="25" height="8" rx="2" fill="rgba(255,255,255,.12)"/>
      <rect x="28" width="8" height="22" rx="2" fill="rgba(255,255,255,.85)"/>
      <rect x="28" y="27" width="8" height="8" rx="2" fill="#F47B00"/>
    </svg>
    <div>
      <div class="nav-name"><span>Orange</span> Fruit</div>
      <div class="nav-tag">Free Your Fit</div>
    </div>
  </div>
  <div class="nav-chip">BOTTOM-UP AI FIT</div>
</nav>

<div class="page" id="page">
  <div class="stepbar" id="stepbar"></div>
  <div class="err-box" id="err-box"></div>
  <div id="v1"></div>
  <div id="v2" style="display:none"></div>
  <div id="v3" style="display:none"></div>
  <div id="v4" style="display:none"></div>
</div>

<footer class="footer">
  <div class="footer-l">Orange Fruit AI BikeFit · v3.0 · Bottom-Up Protocol · Powered by Gemini Flash</div>
  <div class="footer-r">Orange Fruit — Free Your Fit</div>
</footer>

<script>
// ══ CONSTANTS ═══════════════════════════════════════════
const TG = {
  knee_extension: {min:25,max:35,lbl:'膝伸展 BDC'},
  knee_flexion:   {min:90,max:110,lbl:'膝屈曲 TDC'},
  hip_angle:      {min:55,max:75,lbl:'髖關節閉合'},
  ankle_max:      {min:90,max:115,lbl:'腳踝背屈'},
  shoulder_wrist: {min:75,max:95,lbl:'肩→腕角'},
  back_angle:     {min:35,max:50,lbl:'背部角度'},
};
const COL = {ok:'#0B8A5C',wk:'#B86A00',er:'#C0231A',na:'#ADADAA'};
const BG  = {ok:'rgba(11,138,92,.1)',wk:'rgba(184,106,0,.1)',er:'rgba(192,35,26,.1)',na:'#f5f5f5'};
const LL  = {ok:'✓ 達標',wk:'△ 偏差',er:'✕ 超出',na:'—'};

const JOINTS = [
  {key:'neck',     lbl:'頸肩交接', color:'#FFD700', desc:'頸部與肩膀交接處'},
  {key:'shoulder', lbl:'肩峰',     color:'#FF6B6B', desc:'肩膀最高骨性突起'},
  {key:'hip',      lbl:'髖關節',   color:'#FF6B6B', desc:'褲腰側面最突出骨頭'},
  {key:'elbow',    lbl:'手肘',     color:'#4ECDC4', desc:'手臂彎折中心點'},
  {key:'wrist',    lbl:'手腕',     color:'#4ECDC4', desc:'握把附近手腕彎折處'},
  {key:'knee',     lbl:'膝關節',   color:'#FF6B6B', desc:'大腿與小腿交接中心'},
  {key:'ankle',    lbl:'踝關節',   color:'#FF6B6B', desc:'腳踝骨頭中心'},
  {key:'foot',     lbl:'腳掌前端', color:'#FFD700', desc:'腳趾/腳掌最前端'},
];

function gst(v,t){
  if(v==null)return'na';
  if(v>=t.min&&v<=t.max)return'ok';
  if(v<t.min-10||v>t.max+10)return'er';
  return'wk';
}

// ══ STATE ════════════════════════════════════════════════
const S = {
  step:1,
  bdcURL:null, bdcImg:null,
  tdcURL:null, tdcImg:null,
  joints:null,
  result:null,
  error:'',
  tab:'angles',
  pct:0, logs:[],
};

function set(p){Object.assign(S,p);render();postRender();}
function postRender(){
  if(S.step===2)setTimeout(initJointCanvas,80);
  if(S.tab==='visual'&&S.result&&S.bdcImg)requestAnimationFrame(drawSkeleton);
}

// ══ RENDER ═══════════════════════════════════════════════
function render(){
  renderStepbar();
  renderErr();
  document.getElementById('v1').style.display=S.step===1?'':'none';
  document.getElementById('v2').style.display=S.step===2?'':'none';
  document.getElementById('v3').style.display=S.step===3?'':'none';
  document.getElementById('v4').style.display=S.step===4?'':'none';
  if(S.step===1)renderV1();
  if(S.step===2)renderV2();
  if(S.step===3)renderV3();
  if(S.step===4)renderV4();
}

function renderStepbar(){
  const steps=[{n:1,l:'上傳照片'},{n:2,l:'標示關節'},{n:3,l:'AI 分析'},{n:4,l:'查看報告'}];
  document.getElementById('stepbar').innerHTML=steps.map((s,i)=>{
    const cs=S.step>s.n?'done':S.step===s.n?'active':'idle';
    const cl=S.step>=s.n?'active':'idle';
    const conn=i<3?`<div class="step-line${S.step>s.n?' done':''}"></div>`:'';
    return`<div class="step-item"><div class="step-n ${cs}">${S.step>s.n?'✓':s.n}</div><div class="step-l ${cl}">${s.l}</div></div>${conn}`;
  }).join('');
}

function renderErr(){
  const el=document.getElementById('err-box');
  if(S.error){el.style.display='';el.textContent='⚠ '+S.error;}
  else el.style.display='none';
}

// ══ V1: UPLOAD ══════════════════════════════════════════
function renderV1(){
  const can=S.bdcURL||S.tdcURL;
  const has2=S.bdcURL&&S.tdcURL;

  function slot(key,cls,badge,name,icon,desc){
    const url=S[key+'URL'];
    return`<div class="uslot${url?' filled':''}" id="slot-${key}" data-slot="${key}">
      <div class="uslot-head ${cls}"><div class="ubadge ${cls}">${badge}</div><div class="uname">${name}</div></div>
      ${url
        ?`<img class="uprv" src="${url}"><button class="urm" data-rm="${key}">✕</button>`
        :`<div class="uempty"><div class="uicon">${icon}</div><div class="udesc">${desc}</div><div class="uhint">點擊或拖放</div>

function initJointCanvas(){
  const img=document.getElementById('joint-img');
  const canvas=document.getElementById('joint-canvas');
  const wrap=document.getElementById('joint-wrap');
  if(!canvas||!img||!wrap)return;

  function resize(){
    const ir=img.getBoundingClientRect();
    const wr=wrap.getBoundingClientRect();
    canvas.width=ir.width;
    canvas.height=ir.height;
    canvas.style.width=ir.width+'px';
    canvas.style.height=ir.height+'px';
    canvas.style.left=(ir.left-wr.left)+'px';
    canvas.style.top=(ir.top-wr.top)+'px';
    drawJointCanvas();
  }

  function drawJointCanvas(){
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    const j=S.joints||{};

    // 連線
    ctx.strokeStyle='#FFFFFF';ctx.lineWidth=Math.max(2,W/280);ctx.lineCap='round';
    [['neck','shoulder'],['shoulder','hip'],['shoulder','elbow'],['elbow','wrist'],['hip','knee'],['knee','ankle'],['ankle','foot']].forEach(([a,b])=>{
      if(!j[a]||!j[b])return;
      ctx.beginPath();ctx.moveTo(j[a].x*W,j[a].y*H);ctx.lineTo(j[b].x*W,j[b].y*H);ctx.stroke();
    });

    // 關節點
    JOINTS.forEach((jd,i)=>{
      if(!j[jd.key])return;
      const px=j[jd.key].x*W,py=j[jd.key].y*H;
      const r=Math.max(8,W/75);
      ctx.save();
      ctx.beginPath();ctx.arc(px,py,r+4,0,Math.PI*2);ctx.fillStyle=jd.color+'33';ctx.fill();
      ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fillStyle=jd.color;ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(10,W/65)}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(i+1,px,py);
      ctx.restore();
    });
  }

  const allDone=Object.keys(S.joints||{}).length>=JOINTS.length;

  canvas.onclick=function(e){
    if(allDone)return;
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)/canvas.width;
    const y=(e.clientY-r.top)/canvas.height;
    const curJ=JOINTS[Object.keys(S.joints||{}).length];
    if(!curJ)return;
    set({joints:{...(S.joints||{}),[curJ.key]:{x,y}}});
  };

  img.onload=resize;
  if(img.complete)setTimeout(resize,50);
  else img.addEventListener('load',resize);
  window.addEventListener('resize',resize);
}

// ══ ANALYSIS ═════════════════════════════════════════════
async function startAnalysis(){
  if(!S.bdcURL&&!S.tdcURL){set({error:'請先上傳照片'});return;}

  S.step=3;S.error='';S.pct=5;S.logs=[{m:'▶ 準備傳送…',c:'info'}];
  render();

  function addLog(m,c='info'){
    S.logs.push({m,c});
    const el=document.getElementById('plog');
    if(el)el.innerHTML=S.logs.map(l=>`<div class="log-${l.c}">${l.m}</div>`).join('');
  }
  function setPct(p){S.pct=p;const el=document.getElementById('pbf');if(el)el.style.width=p+'%';}

  const has2=S.bdcURL&&S.tdcURL;
  try{
    addLog('⟳ 編碼圖片…','info');setPct(15);
    const content=[];
    if(S.bdcURL){content.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:S.bdcURL.split(',')[1]}});content.push({type:'text',text:has2?'圖一 BDC（曲柄6點鐘下死點）：':'騎乘側面照片：'});}
    if(S.tdcURL){content.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:S.tdcURL.split(',')[1]}});content.push({type:'text',text:'圖二 TDC（曲柄1點鐘近上死點）：'});}

    const skStr=JSON.stringify(S.joints||{});
    content.push({type:'text',text:`你是Bikefit分析師。${has2?'圖一BDC(6點鐘)，圖二TDC(1點鐘)。':'分析此照片。'}
關節座標已由使用者精確標示（直接使用，不要修改）：${skStr}
根據照片和以上座標計算各角度。只回傳JSON，禁止markdown：{"angles":{"knee_extension":<整數或null>,"knee_flexion":<整數>,"hip_angle":<整數>,"ankle_max":<整數>,"shoulder_wrist":<整數>,"back_angle":<整數>},"skeleton":${skStr},"overall":"good或needs_adjustment或poor","confidence":<0-100>,"bottom_up_issues":["<繁中>"],"summary_zh":"<2句繁中>"}`});

    addLog('⟳ 傳送至 AI…','info');setPct(32);

    const resp=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'gemini-flash',max_tokens:800,messages:[{role:'user',content}]})});
    setPct(70);addLog('⟳ 解析結果…','info');

    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${resp.status}`);}

    const data=await resp.json();
    const raw=data.content.map(b=>b.text||'').join('');
    const cleaned=raw.replace(/```json/gi,'').replace(/```/g,'').trim();

    let parsed;
    try{
      const m=cleaned.match(/\{[\s\S]*\}/);
      if(!m)throw new Error('no json');
      parsed=JSON.parse(m[0]);
    }catch(e1){
      // 截斷時只取 angles
      try{
        const angStr=cleaned.match(/"angles"\s*:\s*\{([^}]+)\}/)?.[1];
        if(!angStr)throw new Error('no angles');
        const angles={};
        angStr.match(/"(\w+)"\s*:\s*([\d.]+|null)/g)?.forEach(kv=>{
          const parts=kv.replace(/"/g,'').split(':').map(s=>s.trim());
          angles[parts[0]]=parts[1]==='null'?null:parseInt(parts[1]);
        });
        const overall=cleaned.match(/"overall"\s*:\s*"([^"]+)"/)?.[1]||'needs_adjustment';
        const conf=parseInt(cleaned.match(/"confidence"\s*:\s*(\d+)/)?.[1])||75;
        const summary=cleaned.match(/"summary_zh"\s*:\s*"([^"]+)"/)?.[1]||'分析完成。';
        parsed={angles,skeleton:S.joints||{},overall,confidence:conf,bottom_up_issues:[],summary_zh:summary};
        addLog('⚠ 部分資料已提取','info');
      }catch(e2){throw new Error('解析失敗，請重試');}
    }

    if(!parsed.angles)throw new Error('格式錯誤，請重試');
    // 確保 skeleton 用使用者標示的
    parsed.skeleton=S.joints||parsed.skeleton||{};

    setPct(100);addLog('✓ 分析完成！','ok');
    setTimeout(()=>set({result:parsed,step:4,error:'',tab:'angles'}),700);

  }catch(err){
    addLog('✕ '+err.message,'err');
    setTimeout(()=>set({step:2,error:'分析失敗：'+err.message,logs:[],pct:0}),2500);
  }
}

// ══ SKELETON CANVAS ══════════════════════════════════════
function drawSkeleton(){
  const c=document.getElementById('sk-canvas');
  if(!c||!S.bdcImg||!S.result)return;
  const ctx=c.getContext('2d');
  const IMG=S.bdcImg;
  const cw=c.parentElement?.clientWidth||600;
  const sc=cw/IMG.width;
  c.width=Math.round(IMG.width*sc);
  c.height=Math.round(IMG.height*sc);
  const W=c.width,H=c.height;

  ctx.drawImage(IMG,0,0,W,H);

  // 使用使用者標示的關節點（最精確）
  const sk=S.joints||S.result.skeleton||{};
  const pts={};
  for(const[n,co]of Object.entries(sk)){
    if(co&&co.x!=null)pts[n]={x:co.x*W,y:co.y*H};
  }

  const lw=Math.max(2.5,W/200);

  // 白色骨架連線
  ctx.save();ctx.strokeStyle='#FFFFFF';ctx.lineWidth=lw;ctx.lineCap='round';
  ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=4;
  [['neck','shoulder'],['shoulder','elbow'],['elbow','wrist'],['shoulder','hip'],['hip','knee'],['knee','ankle'],['ankle','foot']].forEach(([a,b])=>{
    if(!pts[a]||!pts[b])return;
    ctx.beginPath();ctx.moveTo(pts[a].x,pts[a].y);ctx.lineTo(pts[b].x,pts[b].y);ctx.stroke();
  });
  ctx.shadowBlur=0;ctx.restore();

  // 角度弧線 + 標籤
  const ang=S.result.angles;
  [['knee','hip','ankle','knee_extension'],['hip','shoulder','knee','hip_angle'],['shoulder','elbow','hip','shoulder_wrist'],['ankle','knee','foot','ankle_max']].forEach(([j,a,b,key])=>{
    if(!pts[j]||!pts[a]||!pts[b])return;
    const v=ang[key];if(v==null)return;
    const t=TG[key],s=gst(v,t),col=COL[s];
    const a1=Math.atan2(pts[a].y-pts[j].y,pts[a].x-pts[j].x);
    const a2=Math.atan2(pts[b].y-pts[j].y,pts[b].x-pts[j].x);
    const arcR=Math.max(22,W/28);
    ctx.save();ctx.beginPath();ctx.arc(pts[j].x,pts[j].y,arcR,a1,a2,false);ctx.strokeStyle=col;ctx.lineWidth=Math.max(2,lw*.8);ctx.setLineDash([3,2]);ctx.stroke();ctx.setLineDash([]);ctx.restore();
    const ma=(a1+a2)/2,ld=arcR+Math.max(18,W/32);
    const lx=pts[j].x+Math.cos(ma)*ld,ly=pts[j].y+Math.sin(ma)*ld,lbl=v+'°';
    ctx.save();ctx.font=`bold ${Math.max(12,W/42)}px monospace`;
    const tw=ctx.measureText(lbl).width,pad=5,bh=Math.max(12,W/42)+8;
    ctx.fillStyle='rgba(0,0,0,.8)';ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(lx-tw/2-pad,ly-bh/2,tw+pad*2,bh,4);else ctx.rect(lx-tw/2-pad,ly-bh/2,tw+pad*2,bh);
    ctx.fill();ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lbl,lx,ly);ctx.restore();
  });

  // 彩色關節點（用 JOINTS 定義的顏色）
  JOINTS.forEach((jd,i)=>{
    const p=pts[jd.key];if(!p)return;
    const r=Math.max(7,W/95);
    ctx.save();
    ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,Math.PI*2);ctx.fillStyle=jd.color+'33';ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=jd.color;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(9,W/70)}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(i+1,p.x,p.y);
    ctx.restore();
  });
}

// ══ EXPORT ═══════════════════════════════════════════════
function exportReport(){
  if(!S.result)return;
  const r=S.result,a=r.angles;
  const lines=['Orange Fruit — Free Your Fit','AI BikeFit 分析報告','═══════════════════════════════',
    `生成：${new Date().toLocaleString('zh-TW')}`,
    `整體：${r.overall==='good'?'姿勢良好':r.overall==='needs_adjustment'?'需要調整':'需要改善'} · 信心度 ${r.confidence||'—'}%`,
    '','【角度量測】',
    ...Object.entries(a).map(([k,v])=>{const t=TG[k];if(!t||v==null)return null;return`${t.lbl}：${v}° (${t.min}-${t.max}°) ${LL[gst(v,t)]}`;}).filter(Boolean),
    '','【AI 摘要】',r.summary_zh||'',
    '','【建議清單】',...(r.bottom_up_issues||[]).map((s,i)=>`${i+1}. ${s}`)];
  const bl=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const el=document.createElement('a');el.href=URL.createObjectURL(bl);el.download=`OrangeFruit_Fit_${Date.now()}.txt`;el.click();
}

// ══ RESET ════════════════════════════════════════════════
function resetAll(){
  S.bdcImg=null;S.tdcImg=null;
  set({step:1,error:'',bdcURL:null,tdcURL:null,joints:null,result:null,tab:'angles',logs:[],pct:0});
}

// ══ INIT ═════════════════════════════════════════════════
render();
</script>
